// ─── PROMOTION HELPERS ────────────────────────────────────────────────────────
// 判斷活動是否「進行中」（active=true 且在起訖區間內）
function normProductIds(p) {
  const raw = p?.product_ids;
  if (!raw) return [];
  if (Array.isArray(raw)) return raw.map(x => Number(x)).filter(n => !Number.isNaN(n));
  if (typeof raw === 'string') {
    try {
      const arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr.map(x => Number(x)).filter(n => !Number.isNaN(n)) : [];
    } catch { return []; }
  }
  return [];
}

/** 以 Asia/Taipei 的日曆日 YYYY-MM-DD（與前台一致） */
function ymdTaipei(d) {
  return new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit' }).format(d);
}

function isTaipeiMidnight(d) {
  const parts = new Intl.DateTimeFormat('en-GB', { timeZone: 'Asia/Taipei', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).formatToParts(d);
  const h = +parts.find(x => x.type === 'hour').value;
  const m = +parts.find(x => x.type === 'minute').value;
  const s = +parts.find(x => x.type === 'second').value;
  return h === 0 && m === 0 && s === 0;
}

function isPromotionLive(p, now = new Date()) {
  if (p && p.active === false) return false;
  if (String(p?.active).toLowerCase() === 'false') return false;
  if (p.start_at && new Date(p.start_at) > now) return false;
  if (p.end_at) {
    const endD = new Date(p.end_at);
    if (Number.isNaN(endD.getTime())) return true;
    if (isTaipeiMidnight(endD)) {
      if (ymdTaipei(now) > ymdTaipei(endD)) return false;
    } else if (endD < now) return false;
  }
  return true;
}

// 活動排程狀態（給 admin 列表用）
function getPromotionPhase(p, now = new Date()) {
  if (p && p.active === false) return 'disabled';
  if (String(p?.active).toLowerCase() === 'false') return 'disabled';
  if (p.start_at && new Date(p.start_at) > now) return 'scheduled';
  if (p.end_at) {
    const endD = new Date(p.end_at);
    if (Number.isNaN(endD.getTime())) return 'live';
    if (isTaipeiMidnight(endD)) {
      if (ymdTaipei(now) > ymdTaipei(endD)) return 'expired';
    } else if (endD < now) return 'expired';
  }
  return 'live';
}

// 以 cart 與目前生效的 promotions 計算折扣
// 回傳 { subtotal, discount, finalSubtotal, promotion }
//   subtotal: 商品原小計（依 user 是否 PRO 取對應價）
//   discount: 折抵金額（>=0）
//   finalSubtotal: 商品折扣後小計（不含運費）
//   promotion: 命中的活動物件（沒命中則為 null）
function calculateDiscount(cart, promotions, user) {
  const isPro = !!user?.isPro;
  const unit = item => isPro ? item.proPrice : item.price;
  const subtotal = cart.reduce((s, i) => s + unit(i) * i.qty, 0);

  if (!Array.isArray(promotions) || promotions.length === 0) {
    return { subtotal, discount: 0, finalSubtotal: subtotal, promotion: null };
  }

  // 取第一個生效中、且購物車裡有它的指定商品的活動（規則：一次只套一個）
  const live = promotions.filter(p => isPromotionLive(p));
  for (const p of live) {
    const ids = new Set(normProductIds(p));
    const promoItems = cart.filter(i => ids.has(Number(i.id)));
    if (promoItems.length === 0) continue;

    const promoSubtotal = promoItems.reduce((s, i) => s + unit(i) * i.qty, 0);
    const rate = Number(p.discount_rate) || 1;
    const amount = Number(p.discount_amount) || 0;
    const afterPromo = Math.max(0, promoSubtotal * rate - amount);
    const discount = Math.round(promoSubtotal - afterPromo);
    return {
      subtotal,
      discount,
      finalSubtotal: subtotal - discount,
      promotion: p,
    };
  }

  return { subtotal, discount: 0, finalSubtotal: subtotal, promotion: null };
}

              onMouseLeave={e => { if (page !== item.id) e.currentTarget.style.color = 'rgba(255,255,255,0.45)'; }}

      <div style={{ padding: '20px 24px', borderTop: '1px solid rgba(255,255,255,0.07)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ width: 32, height: 32, background: 'rgba(255,255,255,0.1)', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, color: '#fff' }}>Y</div>
          <div>
            <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.8)', fontWeight: 500 }}>Yoyo Chiu</div>
            <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.3)', letterSpacing: '0.06em' }}>管理員</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── STAT CARD ────────────────────────────────────────────────────────────────
function StatCard({ label, value, sub, accent, icon }) {
  return (
    <div style={{ background: 'var(--white)', border: '1px solid var(--border)', padding: '24px 28px' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 16 }}>
        <span style={{ fontSize: 11, letterSpacing: '0.1em', color: 'var(--mid)', textTransform: 'uppercase' }}>{label}</span>
        <span style={{ fontSize: 18, opacity: 0.4 }}>{icon}</span>
      </div>
      <div style={{ fontFamily: 'var(--font-d)', fontSize: 32, fontWeight: 400, color: accent || 'var(--dark)', lineHeight: 1, marginBottom: 8 }}>{value}</div>
      <div style={{ fontSize: 12, color: 'var(--mid)' }}>{sub}</div>
    </div>
  );
}

// ─── MINI BAR CHART ──────────────────────────────────────────────────────────
function MiniBarChart({ data, color = 'var(--dark)', height = 80 }) {
  const max = Math.max(...data.map(d => d.revenue));
  return (
    <div style={{ display: 'flex', alignItems: 'flex-end', gap: 6, height }}>
      {data.map((d, i) => (
        <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
          <div style={{ width: '100%', background: i === data.length - 1 ? color : color + '40', borderRadius: 2, height: Math.max(4, (d.revenue / max) * (height - 20)), transition: 'height 0.5s ease' }} />
          <span style={{ fontSize: 9, color: 'var(--mid)', letterSpacing: '0.04em' }}>{d.month}</span>
        </div>
      ))}
    </div>
  );
}

// ─── ORDERS ───────────────────────────────────────────────────────────────────

  const filtered = filter === 'all' ? orders : orders.filter(o => o.status === filter);
  const awaitingCount = orders.filter(o => o.status === 'awaiting_confirm').length;

  function updateStatus(id, status) {
    setOrders(prev => prev.map(o => o.id === id ? { ...o, status } : o));
    if (selected?.id === id) setSelected(s => ({ ...s, status }));
  }

  return (
    <div className={'detail-grid' + (selected ? '' : ' no-panel')}>
      <div>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24, flexWrap: 'wrap', gap: 16 }}>

          <div style={{ display: 'flex', gap: 0, border: '1px solid var(--border)', background: 'var(--white)', flexWrap: 'wrap' }}>
            {[['all','全部'], ['awaiting_confirm','轉帳待確認'], ['paid','已付款'], ['preparing','備貨中'], ['shipped','已出貨'], ['delivered','已到貨']].map(([val, label]) => (
              <button key={val} onClick={() => setFilter(val)} style={{
                padding: '8px 16px', border: 'none', fontSize: 12, letterSpacing: '0.04em',

                display: 'flex', alignItems: 'center', gap: 6,
              }}>
                {label}
                {val === 'awaiting_confirm' && awaitingCount > 0 && (
                  <span style={{
                    background: 'var(--red)', color: '#fff', fontSize: 10, fontWeight: 600,
                    minWidth: 18, height: 18, borderRadius: 9, padding: '0 6px',
                    display: 'inline-flex', alignItems: 'center', justifyContent: 'center', lineHeight: 1,

                  <span style={{ fontSize: 10, color: 'var(--red)', fontWeight: 500 }}>● 待對帳確認</span>
                )}

              <div style={{ fontFamily: 'var(--font-d)', fontSize: 26, fontWeight: 500, letterSpacing: '0.3em', color: 'var(--dark)' }}>

// ─── INVENTORY ────────────────────────────────────────────────────────────────
function Inventory({ products, setProducts, hideHeader }) {
  const [editId, setEditId] = useState(null);
  const [editVal, setEditVal] = useState('');

  function saveStock(id) {
    const val = parseInt(editVal);
    if (!isNaN(val) && val >= 0) {
      setProducts(prev => prev.map(p => p.id === id ? { ...p, stock: val } : p));
    }
    setEditId(null);
  }

  const lowStock = products.filter(p => p.stock <= p.minStock);

  return (
    <div>
      {!hideHeader && (
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
          <h1 style={{ fontFamily: 'var(--font-d)', fontSize: 28, fontWeight: 400 }}>庫存管理</h1>
          <div style={{ display: 'flex', gap: 10 }}>

// ─── AI REORDER ───────────────────────────────────────────────────────────────
function AIReorder({ products }) {
  const [loading, setLoading] = useState(false);
  const [suggestions, setSuggestions] = useState(null);
  const [expanded, setExpanded] = useState(null);

  async function runAI() {
    setLoading(true);
    setSuggestions(null);

    const productData = products.map(p => {
      const monthly = PRODUCT_MONTHLY[p.id] || [3,4,3,2,5,4];
      const avg = (monthly.reduce((a,b) => a+b, 0) / monthly.length).toFixed(1);
      const trend = monthly[monthly.length-1] > monthly[monthly.length-2] ? '上升' : '持平或下降';
      return `- ${p.nameZh}（${p.size}）：庫存 ${p.stock} 件，近6月平均銷量 ${avg} 件/月，趨勢${trend}`;
    }).join('\n');

    const prompt = `你是一個台灣保養品電商的庫存分析顧問。以下是 ECLADO 韓國醫美院線保養品的庫存與銷售數據：

${productData}

請針對每一件商品，分析並給出：
1. 補貨建議數量（考慮安全庫存與銷售趨勢）
2. 補貨緊急程度（緊急/一般/暫不需要）
3. 簡短理由（1-2句話）

請以 JSON 格式回應，格式如下：
[{"name":"商品名稱","qty":建議數量,"urgency":"緊急/一般/暫不需要","reason":"理由"}]

只回應 JSON，不要其他文字。`;

    try {
      const text = await window.claude.complete(prompt);
      const jsonMatch = text.match(/\[[\s\S]*\]/);
      if (jsonMatch) {
        const data = JSON.parse(jsonMatch[0]);
        setSuggestions(data);
      }
    } catch (e) {
      setSuggestions([{ name: '分析失敗', qty: 0, urgency: '錯誤', reason: '請稍後再試' }]);
    }
    setLoading(false);
  }

  const urgencyColor = { '緊急': 'var(--red)', '一般': 'var(--yellow)', '暫不需要': 'var(--green)' };

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 28 }}>
        <div>
          <h1 style={{ fontFamily: 'var(--font-d)', fontSize: 28, fontWeight: 400, marginBottom: 4 }}>AI 補貨建議</h1>
          <p style={{ fontSize: 13, color: 'var(--mid)' }}>根據銷售趨勢與庫存數量，自動分析補貨需求</p>
        </div>
        <button onClick={runAI} disabled={loading} style={{
          padding: '12px 28px', background: loading ? 'var(--mid)' : 'var(--dark)', color: '#fff', border: 'none',
          fontSize: 13, letterSpacing: '0.1em', cursor: loading ? 'not-allowed' : 'pointer',
          display: 'flex', alignItems: 'center', gap: 10, transition: 'background 0.2s',
        }}>
          {loading ? (
            <>
              <span style={{ display: 'inline-block', width: 14, height: 14, border: '2px solid rgba(255,255,255,0.3)', borderTopColor: '#fff', borderRadius: '50%', animation: 'spin 0.8s linear infinite' }} />
              AI 分析中...
            </>
          ) : (
            <><span>✦</span> 開始 AI 分析</>
          )}
        </button>
      </div>

      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>

      {/* Current stock overview */}
      <div className="product-grid-4" style={{ marginBottom: 28 }}>
        {products.map(p => {
          const monthly = PRODUCT_MONTHLY[p.id] || [3,4,3,2,5,4];
          const avg = (monthly.reduce((a,b) => a+b, 0) / monthly.length).toFixed(1);
          const daysLeft = avg > 0 ? Math.round((p.stock / avg) * 30) : 999;
          return (
            <div key={p.id} style={{ background: 'var(--white)', border: `1px solid ${p.stock <= p.minStock ? 'oklch(0.60 0.18 25 / 0.3)' : 'var(--border)'}`, padding: '16px' }}>
              <div style={{ fontSize: 12, fontWeight: 500, color: 'var(--dark)', marginBottom: 4, lineHeight: 1.4 }}>{p.nameZh}</div>
              <div style={{ fontSize: 11, color: 'var(--mid)', marginBottom: 10 }}>{p.size}</div>

function toLocalDateTimeInput(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, '0');
  const parts = new Intl.DateTimeFormat('en-GB', { timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).formatToParts(d);
  const y = parts.find(x => x.type === 'year').value;
  const m = pad(parts.find(x => x.type === 'month').value);
  const day = pad(parts.find(x => x.type === 'day').value);
  const h = pad(parts.find(x => x.type === 'hour').value);
  const min = pad(parts.find(x => x.type === 'minute').value);
  return `${y}-${m}-${day}T${h}:${min}`;
}

function fromLocalDateTimeInput(s) {
  return s ? new Date(s).toISOString() : null;
}

      .from('promotions')
      .select('*')
      .order('created_at', { ascending: false });
    if (!error) setList(data || []);
    setLoading(false);
  }

  useEffect(() => {
    load();
    const ch = supabase
      .channel('promotions-realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'promotions' }, load)

function PromotionForm({ promo, products, onClose }) {
  const [name, setName] = useState(promo?.name || '');
  const [description, setDescription] = useState(promo?.description || '');
  const [productIds, setProductIds] = useState(new Set((promo?.product_ids || []).map(Number)));
  const [rate, setRate] = useState(promo?.discount_rate ?? 0.95);
  const [amount, setAmount] = useState(promo?.discount_amount ?? 1000);
  const [startAt, setStartAt] = useState(toLocalDateTimeInput(promo?.start_at));
  const [endAt, setEndAt] = useState(toLocalDateTimeInput(promo?.end_at));
  const [active, setActive] = useState(promo?.active ?? true);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState('');

  function toggleProduct(id) {
    setProductIds(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  }

  async function save(e) {
    e.preventDefault();
    setError('');
    if (!name.trim()) { setError('請輸入活動名稱'); return; }
    if (productIds.size === 0) { setError('請至少選擇一個參與商品'); return; }

    const payload = {
      name: name.trim(),
      description: description.trim() || null,
      product_ids: Array.from(productIds),
      discount_rate: Number(rate),
      discount_amount: Number(amount),
      start_at: fromLocalDateTimeInput(startAt),
      end_at: fromLocalDateTimeInput(endAt),
      active,
    };

    setSaving(true);
    const { error } = promo
      ? await supabase.from('promotions').update(payload).eq('id', promo.id)
      : await supabase.from('promotions').insert(payload);
    setSaving(false);

    if (error) {
      setError('儲存失敗：' + error.message);
      return;
    }
    onClose();
  }

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24, flexWrap: 'wrap', gap: 16 }}>
        <div>
          <button onClick={onClose} style={{ background: 'none', border: 'none', color: 'var(--mid)', fontSize: 12, cursor: 'pointer', marginBottom: 6, padding: 0 }}>← 返回活動列表</button>
          <h1 style={{ fontFamily: 'var(--font-d)', fontSize: 28, fontWeight: 400 }}>{promo ? '編輯活動' : '新增活動'}</h1>
        </div>
      </div>

      {error && (
        <div style={{ background: 'oklch(0.60 0.18 25 / 0.08)', border: '1px solid oklch(0.60 0.18 25 / 0.3)', padding: '10px 16px', marginBottom: 20, fontSize: 13, color: 'var(--red)' }}>{error}</div>
      )}

      <form onSubmit={save} style={{ background: 'var(--white)', border: '1px solid var(--border)', padding: 'clamp(20px, 4vw, 32px)', display: 'flex', flexDirection: 'column', gap: 24, maxWidth: 880 }}>
        {/* 活動名稱 */}

          <label style={{ fontSize: 11, letterSpacing: '0.12em', color: 'var(--mid)', textTransform: 'uppercase', display: 'block', marginBottom: 8 }}>活動名稱 *</label>

            style={{ width: '100%', border: 'none', borderBottom: '1px solid var(--border)', padding: '10px 0', fontSize: 15, outline: 'none', background: 'none' }} />
        </div>

        {/* 活動說明 */}
        <div>
          <label style={{ fontSize: 11, letterSpacing: '0.12em', color: 'var(--mid)', textTransform: 'uppercase', display: 'block', marginBottom: 8 }}>活動說明（選填）</label>

        </div>

            <p style={{ fontSize: 11, color: 'var(--mid)', marginTop: 4 }}>留白 = 不自動結束</p>
          </div>
        </div>

        {/* 啟用 */}
        <label style={{ display: 'inline-flex', alignItems: 'center', gap: 10, cursor: 'pointer', fontSize: 13, color: 'var(--dark)' }}>
          <input type="checkbox" checked={active} onChange={e => setActive(e.target.checked)} />
          啟用此活動（停用後即使在期間內也不會生效）
        </label>

        {/* 商品選擇 */}
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 12, flexWrap: 'wrap', gap: 8 }}>
            <label style={{ fontSize: 11, letterSpacing: '0.12em', color: 'var(--mid)', textTransform: 'uppercase' }}>參與商品 * <span style={{ color: 'var(--dark)', fontWeight: 500 }}>（已選 {productIds.size} 件）</span></label>
            <div style={{ display: 'flex', gap: 12 }}>
              <button type="button" onClick={() => setProductIds(new Set(products.map(p => p.id)))} style={{ background: 'none', border: 'none', color: 'var(--gold)', fontSize: 11, letterSpacing: '0.06em', cursor: 'pointer', padding: 0 }}>全選</button>
              <button type="button" onClick={() => setProductIds(new Set())} style={{ background: 'none', border: 'none', color: 'var(--mid)', fontSize: 11, letterSpacing: '0.06em', cursor: 'pointer', padding: 0 }}>清除</button>
            </div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(240px, 1fr))', gap: 8, border: '1px solid var(--border)', padding: 12, background: 'var(--off)' }}>
            {products.map(p => {
              const checked = productIds.has(p.id);
              return (
                <label key={p.id} style={{
                  display: 'flex', alignItems: 'center', gap: 10, padding: '8px 10px', cursor: 'pointer',
                  background: checked ? 'var(--white)' : 'transparent',
                  border: `1px solid ${checked ? 'var(--gold)' : 'transparent'}`,
                  fontSize: 12, color: 'var(--dark)',
                }}>
                  <input type="checkbox" checked={checked} onChange={() => toggleProduct(p.id)} style={{ cursor: 'pointer' }} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{p.nameZh}</div>
                    <div style={{ fontSize: 10, color: 'var(--mid)', marginTop: 2 }}>NT$ {p.price.toLocaleString()}</div>
                  </div>
                </label>
              );
            })}
          </div>
        </div>

        {/* 動作 */}
        <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end', flexWrap: 'wrap', marginTop: 8 }}>
          <button type="button" onClick={onClose} style={{
            padding: '12px 24px', background: 'none', color: 'var(--mid)',
            border: '1px solid var(--border)', fontSize: 12, letterSpacing: '0.12em', cursor: 'pointer',
          }}>取消</button>
          <button type="submit" disabled={saving} style={{
            padding: '12px 28px', background: saving ? 'var(--mid)' : 'var(--dark)', color: '#fff',
            border: 'none', fontSize: 12, letterSpacing: '0.12em', cursor: saving ? 'wait' : 'pointer',
          }}>{saving ? '儲存中…' : (promo ? '儲存變更' : '建立活動')}</button>
        </div>
      </form>
    </div>
  );
}

// ─── PASSWORD GATE ────────────────────────────────────────────────────────────
const ADMIN_PASSWORD = 'eclado2026';
const AUTH_KEY = 'eclado_admin_auth';

function PasswordGate({ children }) {
  const [authed, setAuthed] = useState(() => sessionStorage.getItem(AUTH_KEY) === 'ok');
  const [pwd, setPwd] = useState('');
  const [error, setError] = useState('');

  function submit(e) {
    e.preventDefault();
    if (pwd === ADMIN_PASSWORD) {
      sessionStorage.setItem(AUTH_KEY, 'ok');
      setAuthed(true);
    } else {
      setError('密碼錯誤');
      setPwd('');
    }
  }

  if (authed) return children;

  return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--sidebar)', padding: 16 }}>
      <form onSubmit={submit} style={{ background: 'var(--white)', padding: 'clamp(32px, 6vw, 48px) clamp(24px, 5vw, 56px)', width: '100%', maxWidth: 380, boxShadow: '0 4px 24px rgba(0,0,0,0.2)' }}>
        <div style={{ textAlign: 'center', marginBottom: 32 }}>
          <div style={{ fontFamily: 'var(--font-d)', fontSize: 22, letterSpacing: '0.22em', color: 'var(--dark)', marginBottom: 6 }}>ECLADO</div>
          <div style={{ fontSize: 10, letterSpacing: '0.24em', color: 'var(--gold)', textTransform: 'uppercase' }}>管理後台 · 請登入</div>
        </div>
        <label style={{ fontSize: 11, letterSpacing: '0.12em', color: 'var(--mid)', textTransform: 'uppercase', display: 'block', marginBottom: 8 }}>密碼</label>
        <input type="password" value={pwd} onChange={e => { setPwd(e.target.value); setError(''); }} autoFocus
          style={{ width: '100%', border: 'none', borderBottom: '1px solid var(--border)', padding: '10px 0', fontSize: 16, outline: 'none', background: 'none', color: 'var(--dark)', marginBottom: 8 }}
          onFocus={e => e.target.style.borderBottomColor = 'var(--dark)'}
          onBlur={e => e.target.style.borderBottomColor = 'var(--border)'}
        />
        {error && <p style={{ fontSize: 12, color: 'var(--red)', marginBottom: 8 }}>{error}</p>}
        <button type="submit" style={{ width: '100%', background: 'var(--dark)', color: '#fff', border: 'none', padding: '14px', fontSize: 12, letterSpacing: '0.18em', cursor: 'pointer', marginTop: 16 }}>進入後台</button>
      </form>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
// 把 Supabase 欄位（snake_case）轉換為前端用的格式
function normalizeOrder(row) {
  return {
    id: row.id,
    member: row.member,
    type: row.type,
    items: row.items || [],
    total: row.total,
    status: row.status,
    date: row.date,
    address: row.address,
    phone: row.phone,
    email: row.email,
    note: row.note,
    transferLast5: row.transfer_last5,
    tracking: row.tracking,
    user_id: row.user_id,
    subtotal: row.subtotal,
    discount: row.discount || 0,
    promotionName: row.promotion_name,
  };
}

// profiles → 會員顯示用格式
function normalizeMember(row, allOrders) {
  const myOrders = allOrders.filter(o => o.user_id === row.id || o.email === row.email);
  return {
    id: row.id,
    name: row.name || (row.email ? row.email.split('@')[0] : '未命名'),
    email: row.email || '',
    phone: row.phone || '',
    type: row.role || 'consumer',
    cert: row.cert || '',
    joined: row.created_at ? row.created_at.slice(0, 10) : '',
    orders: myOrders.length,
    total: myOrders.reduce((s, o) => s + (o.total || 0), 0),
  };
}

function App() {
  const [page, setPage] = useState('dashboard');
  const [products, setProducts] = useState(INIT_PRODUCTS);
  const [members, setMembers] = useState(INIT_MEMBERS);
  const [orders, setOrders] = useState(INIT_ORDERS);
  const [loadError, setLoadError] = useState('');

  // 從 Supabase 載入訂單 + 會員
  async function fetchAll() {
    try {
      const [ordersRes, profilesRes] = await Promise.all([
        supabase.from('orders').select('*').order('created_at', { ascending: false }),
        supabase.from('profiles').select('*').order('created_at', { ascending: false }),
      ]);
      if (ordersRes.error) throw ordersRes.error;
      if (profilesRes.error) throw profilesRes.error;

      const realOrders = (ordersRes.data || []).map(normalizeOrder);
      const ids = new Set(realOrders.map(o => o.id));
      const mockExtras = INIT_ORDERS.filter(o => !ids.has(o.id));
      const allOrders = [...realOrders, ...mockExtras];
      setOrders(allOrders);

      const realMembers = (profilesRes.data || []).map(p => normalizeMember(p, allOrders));
      setMembers(realMembers.length > 0 ? realMembers : INIT_MEMBERS);

      setLoadError('');
    } catch (err) {
      console.error('fetch failed', err);
      setLoadError('無法連接 Supabase（' + (err.message || '') + '），目前顯示本機示範資料。');
    }
  }

  useEffect(() => {
    fetchAll();
    const channel = supabase
      .channel('admin-realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, () => fetchAll())
      .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, () => fetchAll())
      .subscribe();
    return () => { supabase.removeChannel(channel); };
  }, []);

  // 訂單狀態變動時同步到 Supabase
  async function setOrdersWithSync(updater) {
    setOrders(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      next.forEach(o => {
        const old = prev.find(p => p.id === o.id);
        if (old && old.status !== o.status) {
          supabase.from('orders').update({ status: o.status }).eq('id', o.id).then(({ error }) => {
            if (error) console.error('update status failed', error);
          });
        }
      });
      return next;
    });
  }

  // 會員角色變動時同步到 Supabase
  async function setMembersWithSync(updater) {
    setMembers(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      next.forEach(m => {
        const old = prev.find(p => p.id === m.id);
        if (old && old.type !== m.type) {
          // 只有真實 Supabase 會員（id 是 uuid）才更新
          if (typeof m.id === 'string' && m.id.length > 20) {
            supabase.from('profiles').update({ role: m.type }).eq('id', m.id).then(({ error }) => {
              if (error) console.error('update role failed', error);
            });
          }
        }
      });
      return next;
    });
  }

  function renderPage() {
    switch (page) {
      case 'dashboard': return <Dashboard orders={orders} products={products} members={members} />;
      case 'orders': return <Orders orders={orders} setOrders={setOrdersWithSync} />;
      case 'catalog': return <Catalog products={products} setProducts={setProducts} />;
      // 舊路徑相容，避免有人記住 /admin#products 之類的
      case 'products':
      case 'inventory': return <Catalog products={products} setProducts={setProducts} />;
      case 'promotions': return <Promotions products={products} />;
      case 'members': return <Members members={members} setMembers={setMembersWithSync} orders={orders} />;
      case 'analytics': return <Analytics />;
      case 'ai': return <AIReorder products={products} />;
      default: return <Dashboard orders={orders} products={products} members={members} />;
    }
  }

  const [drawerOpen, setDrawerOpen] = useState(false);

  return (
    <div className="app-shell">
      {/* 手機頂部 bar */}
      <div className="mobile-topbar">
        <button onClick={() => setDrawerOpen(true)} style={{
          background: 'none', border: 'none', cursor: 'pointer', padding: 8,
          display: 'flex', flexDirection: 'column', gap: 4,
        }} aria-label="開啟選單">
          <span style={{ display: 'block', width: 22, height: 1.5, background: '#fff' }} />
          <span style={{ display: 'block', width: 16, height: 1.5, background: '#fff' }} />
          <span style={{ display: 'block', width: 22, height: 1.5, background: '#fff' }} />
        </button>
        <div style={{ fontFamily: 'var(--font-d)', fontSize: 14, letterSpacing: '0.2em', color: '#fff' }}>ECLADO</div>
        <div style={{ width: 38 }} />
      </div>

      {/* 手機抽屜遮罩 */}
      {drawerOpen && <div className="mobile-overlay" onClick={() => setDrawerOpen(false)} />}

      <Sidebar page={page} setPage={setPage} open={drawerOpen} onClose={() => setDrawerOpen(false)} />
      <main className="app-main">
        {loadError && (
          <div style={{ background: 'oklch(0.60 0.18 25 / 0.08)', border: '1px solid oklch(0.60 0.18 25 / 0.3)', padding: '10px 16px', marginBottom: 20, fontSize: 12, color: 'var(--red)' }}>
            ⚠ {loadError}
          </div>
        )}
        {renderPage()}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <PasswordGate><App /></PasswordGate>
);
</script>
</body>
</html>
