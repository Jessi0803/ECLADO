function StatCard({ label, value, sub, accent, icon }) {
  return (
    <div style={{ background: 'var(--white)', border: '1px solid var(--border)', padding: '24px 28px' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 16 }}>

        <span style={{ fontSize: 18, opacity: 0.4 }}>{icon}</span>
      </div>
      <div style={{ fontFamily: 'var(--font-d)', fontSize: 32, fontWeight: 400, color: accent || 'var(--dark)', lineHeight: 1, marginBottom: 8 }}>{value}</div>
      <div style={{ fontSize: 12, color: 'var(--mid)' }}>{sub}</div>
    </div>
  );
}

// ─── MINI BAR CHART ──────────────────────────────────────────────────────────
function MiniBarChart({ data, color = 'var(--dark)', height = 80 }) {
  const max = Math.max(...data.map(d => d.revenue));
  return (
    <div style={{ display: 'flex', alignItems: 'flex-end', gap: 6, height }}>
      {data.map((d, i) => (
        <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
          <div style={{ width: '100%', background: i === data.length - 1 ? color : color + '40', borderRadius: 2, height: Math.max(4, (d.revenue / max) * (height - 20)), transition: 'height 0.5s ease' }} />
          <span style={{ fontSize: 9, color: 'var(--mid)', letterSpacing: '0.04em' }}>{d.month}</span>
        </div>
      ))}
    </div>
  );
}

                <td style={{ padding: '12px' }}><Badge status={o.status} /></td>
                <td style={{ padding: '12px', fontSize: 12, color: 'var(--mid)' }}>{o.date}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── ORDERS ───────────────────────────────────────────────────────────────────
function Orders({ orders, setOrders }) {
  const [selected, setSelected] = useState(null);
  const [filter, setFilter] = useState('awaiting_confirm');

  const filtered = filter === 'all' ? orders : orders.filter(o => o.status === filter);
  const awaitingCount = orders.filter(o => o.status === 'awaiting_confirm').length;

  function updateStatus(id, status) {
    setOrders(prev => prev.map(o => o.id === id ? { ...o, status } : o));
    if (selected?.id === id) setSelected(s => ({ ...s, status }));
  }

  return (
    <div style={{ display: 'grid', gridTemplateColumns: selected ? '1fr 380px' : '1fr', gap: 20 }}>

        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24, flexWrap: 'wrap', gap: 16 }}>

          <div style={{ display: 'flex', gap: 0, border: '1px solid var(--border)', background: 'var(--white)', flexWrap: 'wrap' }}>
            {[['all','全部'], ['awaiting_confirm','轉帳待確認'], ['pending','待付款'], ['paid','已付款'], ['shipped','已出貨'], ['delivered','已到貨']].map(([val, label]) => (
              <button key={val} onClick={() => setFilter(val)} style={{
                padding: '8px 16px', border: 'none', fontSize: 12, letterSpacing: '0.04em',

                  <span style={{
                    background: 'var(--red)', color: '#fff', fontSize: 10, fontWeight: 600,
                    minWidth: 18, height: 18, borderRadius: 9, padding: '0 6px',

                {['訂單編號', '會員', '類型', '金額', '末五碼', '狀態', '日期', '操作'].map(h => (
                  <th key={h} style={{ padding: '12px 14px', textAlign: 'left', fontSize: 11, color: 'var(--mid)', fontWeight: 400, letterSpacing: '0.08em', whiteSpace: 'nowrap' }}>{h}</th>
                ))}

                  <td style={{ padding: '13px 14px', fontSize: 13 }}>{o.member}</td>
                  <td style={{ padding: '13px 14px' }}><TypeBadge type={o.type} /></td>
                  <td style={{ padding: '13px 14px', fontSize: 13, fontWeight: 500 }}>NT$ {o.total.toLocaleString()}</td>

                    )}
                    {o.status === 'shipped' && (
                      <button onClick={e => { e.stopPropagation(); updateStatus(o.id, 'delivered'); }} style={{ padding: '5px 12px', fontSize: 11, background: 'var(--green)', color: '#fff', border: 'none', letterSpacing: '0.06em', whiteSpace: 'nowrap' }}>確認到貨</button>

            <div><div style={{ fontSize: 11, color: 'var(--mid)', marginBottom: 4 }}>日期</div><div style={{ fontSize: 13 }}>{selected.date}</div></div>
            <div><div style={{ fontSize: 11, color: 'var(--mid)', marginBottom: 4 }}>狀態</div><Badge status={selected.status} /></div>
            <div><div style={{ fontSize: 11, color: 'var(--mid)', marginBottom: 4 }}>類型</div><TypeBadge type={selected.type} /></div>
          </div>

          {/* 轉帳資訊區塊 */}
          {selected.transferLast5 && (
            <div style={{
              border: `1px solid ${selected.status === 'awaiting_confirm' ? 'oklch(0.60 0.18 25 / 0.4)' : 'var(--border)'}`,
              background: selected.status === 'awaiting_confirm' ? 'oklch(0.60 0.18 25 / 0.04)' : 'var(--off)',
              padding: '14px 16px', marginBottom: 20,
            }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                <span style={{ fontSize: 11, color: 'var(--mid)', letterSpacing: '0.08em', textTransform: 'uppercase' }}>轉帳末五碼</span>
                {selected.status === 'awaiting_confirm' && (
                  <span style={{ fontSize: 10, color: 'var(--red)', fontWeight: 500 }}>● 待對帳確認</span>

                {selected.transferLast5}

              <div style={{ fontSize: 11, color: 'var(--mid)', marginTop: 6 }}>應收金額：NT$ {selected.total.toLocaleString()}</div>

          {selected.phone && (
            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, color: 'var(--mid)', marginBottom: 4 }}>聯絡電話</div>

// ─── INVENTORY ────────────────────────────────────────────────────────────────
function Inventory({ products, setProducts }) {
  const [editId, setEditId] = useState(null);
  const [editVal, setEditVal] = useState('');

  function saveStock(id) {
    const val = parseInt(editVal);
    if (!isNaN(val) && val >= 0) {
      setProducts(prev => prev.map(p => p.id === id ? { ...p, stock: val } : p));
    }
    setEditId(null);
  }

  const lowStock = products.filter(p => p.stock <= p.minStock);

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
        <h1 style={{ fontFamily: 'var(--font-d)', fontSize: 28, fontWeight: 400 }}>庫存管理</h1>
        <div style={{ display: 'flex', gap: 10 }}>
          <div style={{ padding: '8px 16px', background: 'var(--white)', border: '1px solid var(--border)', fontSize: 12, color: 'var(--mid)' }}>
            共 {products.length} 件商品
          </div>
          {lowStock.length > 0 && (
            <div style={{ padding: '8px 16px', background: 'oklch(0.60 0.18 25 / 0.08)', border: '1px solid oklch(0.60 0.18 25 / 0.3)', fontSize: 12, color: 'var(--red)', fontWeight: 500 }}>
              ⚠ {lowStock.length} 件庫存不足
            </div>
          )}
        </div>
      </div>

      {lowStock.length > 0 && (
        <div style={{ background: 'oklch(0.60 0.18 25 / 0.05)', border: '1px solid oklch(0.60 0.18 25 / 0.2)', padding: '16px 20px', marginBottom: 20 }}>
          <div style={{ fontSize: 12, fontWeight: 500, color: 'var(--red)', marginBottom: 10 }}>⚠ 庫存不足警示 — 以下商品需要補貨</div>
          <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
            {lowStock.map(p => (
              <div key={p.id} style={{ fontSize: 12, background: 'var(--white)', border: '1px solid var(--border)', padding: '6px 12px', display: 'flex', gap: 8, alignItems: 'center' }}>
                <span style={{ color: 'var(--dark)' }}>{p.nameZh}</span>
                <span style={{ fontWeight: 700, color: p.stock === 0 ? 'var(--red)' : 'var(--yellow)' }}>{p.stock} 件</span>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{ background: 'var(--white)', border: '1px solid var(--border)' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr style={{ borderBottom: '1px solid var(--border)', background: 'var(--off)' }}>
              {['商品名稱', '分類', '規格', '售價', '專業價', '庫存數量', '狀態', '操作'].map(h => (
                <th key={h} style={{ padding: '12px 14px', textAlign: 'left', fontSize: 11, color: 'var(--mid)', fontWeight: 400, letterSpacing: '0.08em', whiteSpace: 'nowrap' }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {products.map(p => {
              const isLow = p.stock <= p.minStock;
              return (
                <tr key={p.id} style={{ borderBottom: '1px solid var(--border)', background: isLow && p.stock === 0 ? 'oklch(0.60 0.18 25 / 0.03)' : 'transparent' }}>
                  <td style={{ padding: '13px 14px' }}>
                    <div style={{ fontSize: 13, fontWeight: 500, color: 'var(--dark)' }}>{p.nameZh}</div>
                    <div style={{ fontSize: 11, color: 'var(--mid)' }}>{p.name}</div>
                  </td>
                  <td style={{ padding: '13px 14px', fontSize: 12, color: 'var(--mid)' }}>{p.category}</td>
                  <td style={{ padding: '13px 14px', fontSize: 12 }}>{p.size}</td>
                  <td style={{ padding: '13px 14px', fontSize: 12 }}>NT$ {p.price.toLocaleString()}</td>
                  <td style={{ padding: '13px 14px', fontSize: 12, color: 'var(--gold)' }}>NT$ {p.proPrice.toLocaleString()}</td>
                  <td style={{ padding: '13px 14px' }}>
                    {editId === p.id ? (
                      <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                        <input type="number" value={editVal} onChange={e => setEditVal(e.target.value)} style={{ width: 64, padding: '4px 8px', border: '1px solid var(--dark)', fontSize: 13, outline: 'none' }} autoFocus onKeyDown={e => { if (e.key === 'Enter') saveStock(p.id); if (e.key === 'Escape') setEditId(null); }} />
                        <button onClick={() => saveStock(p.id)} style={{ padding: '4px 10px', background: 'var(--dark)', color: '#fff', border: 'none', fontSize: 11, cursor: 'pointer' }}>✓</button>
                        <button onClick={() => setEditId(null)} style={{ padding: '4px 8px', background: 'none', border: '1px solid var(--border)', fontSize: 11, cursor: 'pointer', color: 'var(--mid)' }}>✗</button>
                      </div>
                    ) : (
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                        <span style={{ fontSize: 16, fontWeight: 600, color: p.stock === 0 ? 'var(--red)' : isLow ? 'var(--yellow)' : 'var(--dark)' }}>{p.stock}</span>
                        <span style={{ fontSize: 11, color: 'var(--mid)' }}>件</span>
                      </div>
                    )}
                  </td>
                  <td style={{ padding: '13px 14px' }}>
                    {p.stock === 0 ? <span style={{ fontSize: 11, color: 'var(--red)', fontWeight: 500 }}>缺貨</span>
                    : isLow ? <span style={{ fontSize: 11, color: 'var(--yellow)', fontWeight: 500 }}>低庫存</span>
                    : <span style={{ fontSize: 11, color: 'var(--green)', fontWeight: 500 }}>正常</span>}
                  </td>
                  <td style={{ padding: '13px 14px' }}>
                    <button onClick={() => { setEditId(p.id); setEditVal(String(p.stock)); }} style={{ padding: '5px 14px', fontSize: 11, background: 'none', border: '1px solid var(--border)', color: 'var(--dark)', cursor: 'pointer', letterSpacing: '0.04em' }}>修改庫存</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── AI REORDER ───────────────────────────────────────────────────────────────
function AIReorder({ products }) {
  const [loading, setLoading] = useState(false);
  const [suggestions, setSuggestions] = useState(null);
  const [expanded, setExpanded] = useState(null);

  async function runAI() {
    setLoading(true);
    setSuggestions(null);

    const productData = products.map(p => {
      const monthly = PRODUCT_MONTHLY[p.id] || [3,4,3,2,5,4];
      const avg = (monthly.reduce((a,b) => a+b, 0) / monthly.length).toFixed(1);
      const trend = monthly[monthly.length-1] > monthly[monthly.length-2] ? '上升' : '持平或下降';
      return `- ${p.nameZh}（${p.size}）：庫存 ${p.stock} 件，近6月平均銷量 ${avg} 件/月，趨勢${trend}`;
    }).join('\n');

    const prompt = `你是一個台灣保養品電商的庫存分析顧問。以下是 ECLADO 韓國醫美院線保養品的庫存與銷售數據：

${productData}

請針對每一件商品，分析並給出：
1. 補貨建議數量（考慮安全庫存與銷售趨勢）
2. 補貨緊急程度（緊急/一般/暫不需要）
3. 簡短理由（1-2句話）

請以 JSON 格式回應，格式如下：
[{"name":"商品名稱","qty":建議數量,"urgency":"緊急/一般/暫不需要","reason":"理由"}]

只回應 JSON，不要其他文字。`;

    try {
      const text = await window.claude.complete(prompt);
      const jsonMatch = text.match(/\[[\s\S]*\]/);
      if (jsonMatch) {
        const data = JSON.parse(jsonMatch[0]);
        setSuggestions(data);
      }
    } catch (e) {
      setSuggestions([{ name: '分析失敗', qty: 0, urgency: '錯誤', reason: '請稍後再試' }]);
    }
    setLoading(false);
  }

  const urgencyColor = { '緊急': 'var(--red)', '一般': 'var(--yellow)', '暫不需要': 'var(--green)' };

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 28 }}>
        <div>
          <h1 style={{ fontFamily: 'var(--font-d)', fontSize: 28, fontWeight: 400, marginBottom: 4 }}>AI 補貨建議</h1>
          <p style={{ fontSize: 13, color: 'var(--mid)' }}>根據銷售趨勢與庫存數量，自動分析補貨需求</p>
        </div>
        <button onClick={runAI} disabled={loading} style={{
          padding: '12px 28px', background: loading ? 'var(--mid)' : 'var(--dark)', color: '#fff', border: 'none',
          fontSize: 13, letterSpacing: '0.1em', cursor: loading ? 'not-allowed' : 'pointer',
          display: 'flex', alignItems: 'center', gap: 10, transition: 'background 0.2s',
        }}>
          {loading ? (
            <>
              <span style={{ display: 'inline-block', width: 14, height: 14, border: '2px solid rgba(255,255,255,0.3)', borderTopColor: '#fff', borderRadius: '50%', animation: 'spin 0.8s linear infinite' }} />
              AI 分析中...
            </>
          ) : (
            <><span>✦</span> 開始 AI 分析</>
          )}
        </button>
      </div>

      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>

      {/* Current stock overview */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginBottom: 28 }}>
        {products.map(p => {
          const monthly = PRODUCT_MONTHLY[p.id] || [3,4,3,2,5,4];
          const avg = (monthly.reduce((a,b) => a+b, 0) / monthly.length).toFixed(1);
          const daysLeft = avg > 0 ? Math.round((p.stock / avg) * 30) : 999;
          return (
            <div key={p.id} style={{ background: 'var(--white)', border: `1px solid ${p.stock <= p.minStock ? 'oklch(0.60 0.18 25 / 0.3)' : 'var(--border)'}`, padding: '16px' }}>
              <div style={{ fontSize: 12, fontWeight: 500, color: 'var(--dark)', marginBottom: 4, lineHeight: 1.4 }}>{p.nameZh}</div>
              <div style={{ fontSize: 11, color: 'var(--mid)', marginBottom: 10 }}>{p.size}</div>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
                <div>
                  <div style={{ fontSize: 22, fontFamily: 'var(--font-d)', fontWeight: 400, color: p.stock === 0 ? 'var(--red)' : p.stock <= p.minStock ? 'var(--yellow)' : 'var(--dark)' }}>{p.stock}</div>
                  <div style={{ fontSize: 10, color: 'var(--mid)' }}>件庫存</div>
                </div>
                <div style={{ textAlign: 'right' }}>
                  <div style={{ fontSize: 12, color: 'var(--dark)' }}>{avg}</div>
                  <div style={{ fontSize: 10, color: 'var(--mid)' }}>件/月均</div>
                </div>
              </div>
              <div style={{ marginTop: 10, fontSize: 11, color: daysLeft < 30 ? 'var(--red)' : 'var(--mid)' }}>
                {daysLeft >= 999 ? '庫存充足' : `約剩 ${daysLeft} 天`}
              </div>
              {/* Mini sparkline */}
              <div style={{ display: 'flex', gap: 2, marginTop: 8, alignItems: 'flex-end', height: 24 }}>
                {monthly.map((v, i) => (
                  <div key={i} style={{ flex: 1, background: i === monthly.length-1 ? 'var(--dark)' : 'var(--light)', height: Math.max(3, (v / Math.max(...monthly)) * 24), borderRadius: 1 }} />
                ))}
              </div>
            </div>
          );
        })}
      </div>

      {/* AI suggestions */}
      {!suggestions && !loading && (
        <div style={{ background: 'var(--white)', border: '1px solid var(--border)', padding: '60px', textAlign: 'center' }}>
          <div style={{ fontSize: 40, marginBottom: 16, opacity: 0.3 }}>✦</div>
          <p style={{ fontFamily: 'var(--font-d)', fontSize: 22, fontWeight: 300, color: 'var(--dark)', marginBottom: 8 }}>AI 補貨分析</p>
          <p style={{ fontSize: 13, color: 'var(--mid)', marginBottom: 28, lineHeight: 1.7 }}>點擊「開始 AI 分析」，系統將根據您的銷售趨勢<br />與庫存數量，自動生成補貨建議報告</p>
          <button onClick={runAI} style={{ padding: '12px 36px', background: 'var(--dark)', color: '#fff', border: 'none', fontSize: 12, letterSpacing: '0.12em', cursor: 'pointer' }}>✦ 開始分析</button>
        </div>
      )}

      {loading && (
        <div style={{ background: 'var(--white)', border: '1px solid var(--border)', padding: '60px', textAlign: 'center' }}>
          <div style={{ width: 32, height: 32, border: '2px solid var(--light)', borderTopColor: 'var(--dark)', borderRadius: '50%', animation: 'spin 0.8s linear infinite', margin: '0 auto 20px' }} />
          <p style={{ fontSize: 13, color: 'var(--mid)' }}>AI 正在分析銷售數據與庫存狀態...</p>
        </div>
      )}

      {suggestions && (
        <div style={{ background: 'var(--white)', border: '1px solid var(--border)', padding: '28px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
            <h3 style={{ fontSize: 15, fontWeight: 500 }}>AI 分析結果</h3>
            <button onClick={runAI} style={{ padding: '7px 18px', background: 'none', border: '1px solid var(--border)', fontSize: 12, color: 'var(--mid)', cursor: 'pointer', letterSpacing: '0.06em' }}>重新分析</button>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            {suggestions.map((s, i) => (
              <div key={i} style={{ border: '1px solid var(--border)', padding: '16px 20px', display: 'grid', gridTemplateColumns: '1fr auto auto', gap: 20, alignItems: 'center', cursor: 'pointer', transition: 'background 0.1s', background: expanded === i ? 'var(--off)' : 'transparent' }}
              onClick={() => setExpanded(expanded === i ? null : i)}>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 4 }}>{s.name}</div>
                  {expanded === i && <div style={{ fontSize: 12, color: 'var(--mid)', lineHeight: 1.7, marginTop: 8 }}>{s.reason}</div>}
                </div>
                <div style={{ textAlign: 'center' }}>
                  <div style={{ fontFamily: 'var(--font-d)', fontSize: 24, fontWeight: 400, color: 'var(--dark)' }}>{s.qty}</div>
                  <div style={{ fontSize: 10, color: 'var(--mid)' }}>建議補貨件數</div>
                </div>
                <div>
                  <span style={{ display: 'inline-block', padding: '4px 12px', fontSize: 11, fontWeight: 500, background: (urgencyColor[s.urgency] || 'var(--mid)') + '18', color: urgencyColor[s.urgency] || 'var(--mid)', borderRadius: 2, whiteSpace: 'nowrap' }}>{s.urgency}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

const ADMIN_PASSWORD = 'eclado2026';
const AUTH_KEY = 'eclado_admin_auth';

function PasswordGate({ children }) {
  const [authed, setAuthed] = useState(() => sessionStorage.getItem(AUTH_KEY) === 'ok');
  const [pwd, setPwd] = useState('');
  const [error, setError] = useState('');

  function submit(e) {
    e.preventDefault();
    if (pwd === ADMIN_PASSWORD) {
      sessionStorage.setItem(AUTH_KEY, 'ok');
      setAuthed(true);
    } else {
      setError('密碼錯誤');
      setPwd('');
    }
  }

  if (authed) return children;

  return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--sidebar)' }}>
      <form onSubmit={submit} style={{ background: 'var(--white)', padding: '48px 56px', minWidth: 360, boxShadow: '0 4px 24px rgba(0,0,0,0.2)' }}>

        </div>
        <label style={{ fontSize: 11, letterSpacing: '0.12em', color: 'var(--mid)', textTransform: 'uppercase', display: 'block', marginBottom: 8 }}>密碼</label>
        <input type="password" value={pwd} onChange={e => { setPwd(e.target.value); setError(''); }} autoFocus
          style={{ width: '100%', border: 'none', borderBottom: '1px solid var(--border)', padding: '10px 0', fontSize: 16, outline: 'none', background: 'none', color: 'var(--dark)', marginBottom: 8 }}
          onFocus={e => e.target.style.borderBottomColor = 'var(--dark)'}
          onBlur={e => e.target.style.borderBottomColor = 'var(--border)'}
        />
        {error && <p style={{ fontSize: 12, color: 'var(--red)', marginBottom: 8 }}>{error}</p>}
        <button type="submit" style={{ width: '100%', background: 'var(--dark)', color: '#fff', border: 'none', padding: '14px', fontSize: 12, letterSpacing: '0.18em', cursor: 'pointer', marginTop: 16 }}>進入後台</button>
      </form>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
// 把 Supabase 欄位（snake_case）轉換為前端用的格式
function normalizeOrder(row) {
  return {
    id: row.id,
    member: row.member,
    type: row.type,
    items: row.items || [],
    total: row.total,
    status: row.status,
    date: row.date,
    address: row.address,
    phone: row.phone,
    email: row.email,
    note: row.note,
    transferLast5: row.transfer_last5,
    tracking: row.tracking,
    user_id: row.user_id,
  };
}

// profiles → 會員顯示用格式
function normalizeMember(row, allOrders) {
  const myOrders = allOrders.filter(o => o.user_id === row.id || o.email === row.email);
  return {
    id: row.id,
    name: row.name || (row.email ? row.email.split('@')[0] : '未命名'),
    email: row.email || '',
    phone: row.phone || '',
    type: row.role || 'consumer',
    cert: row.cert || '',
    joined: row.created_at ? row.created_at.slice(0, 10) : '',
    orders: myOrders.length,
    total: myOrders.reduce((s, o) => s + (o.total || 0), 0),
  };
}

function App() {
  const [page, setPage] = useState('dashboard');
  const [products, setProducts] = useState(INIT_PRODUCTS);
  const [members, setMembers] = useState(INIT_MEMBERS);
  const [orders, setOrders] = useState(INIT_ORDERS);
  const [loadError, setLoadError] = useState('');

  // 從 Supabase 載入訂單 + 會員
  async function fetchAll() {
    try {
      const [ordersRes, profilesRes] = await Promise.all([
        supabase.from('orders').select('*').order('created_at', { ascending: false }),
        supabase.from('profiles').select('*').order('created_at', { ascending: false }),
      ]);
      if (ordersRes.error) throw ordersRes.error;
      if (profilesRes.error) throw profilesRes.error;

      const realOrders = (ordersRes.data || []).map(normalizeOrder);
      const ids = new Set(realOrders.map(o => o.id));
      const mockExtras = INIT_ORDERS.filter(o => !ids.has(o.id));
      const allOrders = [...realOrders, ...mockExtras];
      setOrders(allOrders);

      const realMembers = (profilesRes.data || []).map(p => normalizeMember(p, allOrders));
      setMembers(realMembers.length > 0 ? realMembers : INIT_MEMBERS);

      setLoadError('');
    } catch (err) {
      console.error('fetch failed', err);
      setLoadError('無法連接 Supabase（' + (err.message || '') + '），目前顯示本機示範資料。');
    }
  }

  useEffect(() => {
    fetchAll();
    const channel = supabase
      .channel('admin-realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, () => fetchAll())
      .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, () => fetchAll())
      .subscribe();
    return () => { supabase.removeChannel(channel); };
  }, []);

  // 訂單狀態變動時同步到 Supabase
  async function setOrdersWithSync(updater) {
    setOrders(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      next.forEach(o => {
        const old = prev.find(p => p.id === o.id);
        if (old && old.status !== o.status) {
          supabase.from('orders').update({ status: o.status }).eq('id', o.id).then(({ error }) => {
            if (error) console.error('update status failed', error);
          });
        }
      });
      return next;
    });
  }

  // 會員角色變動時同步到 Supabase
  async function setMembersWithSync(updater) {
    setMembers(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      next.forEach(m => {
        const old = prev.find(p => p.id === m.id);
        if (old && old.type !== m.type) {
          // 只有真實 Supabase 會員（id 是 uuid）才更新
          if (typeof m.id === 'string' && m.id.length > 20) {
            supabase.from('profiles').update({ role: m.type }).eq('id', m.id).then(({ error }) => {
              if (error) console.error('update role failed', error);
            });
          }
        }
      });
      return next;
    });
  }

  function renderPage() {
    switch (page) {
      case 'dashboard': return <Dashboard orders={orders} products={products} members={members} />;
      case 'orders': return <Orders orders={orders} setOrders={setOrdersWithSync} />;
      case 'products': return <ProductsPage products={products} setProducts={setProducts} />;
      case 'inventory': return <Inventory products={products} setProducts={setProducts} />;
      case 'members': return <Members members={members} setMembers={setMembersWithSync} orders={orders} />;
      case 'analytics': return <Analytics />;
      case 'ai': return <AIReorder products={products} />;
      default: return <Dashboard orders={orders} products={products} members={members} />;
    }
  }

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      <Sidebar page={page} setPage={setPage} />
      <main style={{ marginLeft: 'var(--sidebar-w)', flex: 1, overflowY: 'auto', padding: '36px 40px', background: 'var(--bg)' }}>
        {loadError && (
          <div style={{ background: 'oklch(0.60 0.18 25 / 0.08)', border: '1px solid oklch(0.60 0.18 25 / 0.3)', padding: '10px 16px', marginBottom: 20, fontSize: 12, color: 'var(--red)' }}>
            ⚠ {loadError}
          </div>
        )}
        {renderPage()}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <PasswordGate><App /></PasswordGate>
);
</script>
</body>
</html>
