// ─── PROMOTION HELPERS ────────────────────────────────────────────────────────
// Supabase integer[] 有時是數字、有時是字串，統一成數字 id
function normProductIds(p) {
  const raw = p?.product_ids;
  if (!raw) return [];
  if (Array.isArray(raw)) return raw.map(x => Number(x)).filter(n => !Number.isNaN(n));
  if (typeof raw === 'string') {
    try {
      const arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr.map(x => Number(x)).filter(n => !Number.isNaN(n)) : [];
    } catch { return []; }
  }
  return [];
}

function isPromotionLive(p, now = new Date()) {
  // 僅在明確為 false 時停用（避免 API 漏欄位被當成不生效）
  if (p && p.active === false) return false;
  if (p.start_at && new Date(p.start_at) > now) return false;
  if (p.end_at && new Date(p.end_at) < now) return false;
  return true;
}

// 用購物車與目前生效的活動，回傳折扣計算結果
function calculateDiscount(cart, promotions, user) {
  const isPro = !!user?.isPro;
  const unit = item => isPro ? item.proPrice : item.price;
  const subtotal = cart.reduce((s, i) => s + unit(i) * i.qty, 0);

  if (!Array.isArray(promotions) || promotions.length === 0) {
    return { subtotal, discount: 0, finalSubtotal: subtotal, promotion: null };
  }
  const live = promotions.filter(p => isPromotionLive(p));
  for (const p of live) {
    const ids = new Set(normProductIds(p));
    const promoItems = cart.filter(i => ids.has(Number(i.id)));
    if (promoItems.length === 0) continue;
    const promoSubtotal = promoItems.reduce((s, i) => s + unit(i) * i.qty, 0);
    const rate = Number(p.discount_rate) || 1;
    const amount = Number(p.discount_amount) || 0;
    const afterPromo = Math.max(0, promoSubtotal * rate - amount);
    const discount = Math.round(promoSubtotal - afterPromo);
    return { subtotal, discount, finalSubtotal: subtotal - discount, promotion: p };
  }
  return { subtotal, discount: 0, finalSubtotal: subtotal, promotion: null };
}

// 倒數計時 hook（每秒更新）
function useCountdown(targetISO) {
  const [now, setNow] = useState(() => Date.now());
  useEffect(() => {
    if (!targetISO) return;
    const t = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(t);
  }, [targetISO]);
  if (!targetISO) return null;
  const diff = new Date(targetISO).getTime() - now;
  if (diff <= 0) return { ended: true, days: 0, hours: 0, minutes: 0, seconds: 0 };
  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const minutes = Math.floor((diff % 3600000) / 60000);
  const seconds = Math.floor((diff % 60000) / 1000);
  return { ended: false, days, hours, minutes, seconds };
}

// ─── NAV ─────────────────────────────────────────────────────────────────────
function Nav({ setPage, cartCount, user, setUser, page }) {
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);
  const [productDetailOpen, setProductDetailOpen] = useState(false);
  const isMobile = useIsMobile();
  const darkMode = scrolled || page !== 'home' || productDetailOpen;

  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);
  }, []);

  // ProductDetail 開關時同步深色模式
  useEffect(() => {
    const sync = () => setProductDetailOpen(!!window.__productDetailOpen);
    sync();
    window.addEventListener('product-detail-toggle', sync);
    return () => window.removeEventListener('product-detail-toggle', sync);
  }, []);

  useEffect(() => { if (!isMobile) setDrawerOpen(false); }, [isMobile]);

  const iconCol = darkMode ? 'var(--black)' : 'rgba(255,255,255,0.88)';

  return (
    <>
      <nav style={{
        position:'fixed', top:0, left:0, right:0, zIndex:100,
        background: drawerOpen || darkMode ? 'var(--white)' : 'transparent',
        backdropFilter: 'none',
        borderBottom: darkMode || drawerOpen ? '1px solid var(--light)' : '1px solid rgba(255,255,255,0.1)',
        transition:'background 0.4s, border-color 0.4s',
      }}>
        <div style={{ maxWidth:1280, margin:'0 auto', padding:'0 24px', height:68, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          {/* Logo */}
          <div onClick={() => { setPage('home'); setDrawerOpen(false); }} style={{ cursor:'pointer', display:'flex', flexDirection:'column', gap:1, flexShrink:0 }}>
            <span style={{ fontFamily:'var(--font-display)', fontSize:20, fontWeight:400, letterSpacing:'0.22em', color: darkMode || drawerOpen ? 'var(--black)' : 'var(--white)' }}>ECLADO</span>
            <span style={{ fontSize:9, letterSpacing:'0.28em', color:'var(--gold)', textTransform:'uppercase' }}>Korean Cosmeceuticals</span>
          </div>

          {/* Desktop nav */}
          <div className="nav-desktop">
            {NAV_ITEMS.map(item => <NavItem key={item.label} item={item} scrolled={darkMode} setPage={setPage} />)}
          </div>

          {/* Desktop right */}
          <div className="nav-right">
            {user ? (
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                {user.isPro && <span style={{ fontSize:10, letterSpacing:'0.1em', background: darkMode ? 'var(--black)' : 'rgba(255,255,255,0.15)', color:'var(--white)', padding:'3px 8px', fontWeight:500 }}>PRO</span>}
                <button onClick={() => setPage('account')} style={{ background:'none', border:'none', cursor:'pointer', fontSize:13, color:iconCol, fontFamily:'var(--font-body)' }}>{user.name}</button>
                <button onClick={() => setUser()} style={{ background:'none', border:'none', cursor:'pointer', fontSize:12, color: darkMode ? 'var(--mid)' : 'rgba(255,255,255,0.5)', fontFamily:'var(--font-body)' }}>登出</button>
              </div>
            ) : null}
            <button onClick={() => setPage('cart')} style={{ background:'none', border:'none', cursor:'pointer', fontSize:13, color:iconCol, fontFamily:'var(--font-body)', letterSpacing:'0.04em', position:'relative', padding:'4px 0', whiteSpace:'nowrap' }}>
              購物車
              {cartCount > 0 && <span style={{ position:'absolute', top:-4, right:-14, background:'var(--black)', color:'var(--white)', fontSize:9, width:16, height:16, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center' }}>{cartCount}</span>}
            </button>
          </div>

          {/* Mobile hamburger row */}
          <div className="nav-hamburger">
            <button onClick={() => setPage('cart')} style={{ background:'none', border:'none', cursor:'pointer', fontSize:13, color: drawerOpen ? 'var(--dark)' : iconCol, fontFamily:'var(--font-body)', position:'relative', padding:'4px 0' }}>
              購物車
              {cartCount > 0 && <span style={{ position:'absolute', top:-4, right:-14, background:'var(--black)', color:'var(--white)', fontSize:9, width:16, height:16, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center' }}>{cartCount}</span>}
            </button>
            <button onClick={() => setDrawerOpen(o => !o)} style={{ background:'none', border:'none', cursor:'pointer', display:'flex', flexDirection:'column', gap:5, padding:4 }}>
              {drawerOpen ? (
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M4 4l12 12M16 4L4 16" stroke={drawerOpen ? 'var(--dark)' : iconCol} strokeWidth="1.5" strokeLinecap="round"/></svg>
              ) : (
                <>
                  <span style={{ display:'block', width:22, height:1.5, background: darkMode ? 'var(--dark)' : 'var(--white)' }}/>
                  <span style={{ display:'block', width:16, height:1.5, background: darkMode ? 'var(--dark)' : 'var(--white)' }}/>
                  <span style={{ display:'block', width:22, height:1.5, background: darkMode ? 'var(--dark)' : 'var(--white)' }}/>
                </>
              )}
            </button>
          </div>
        </div>
      </nav>

      {/* Mobile drawer */}
      {drawerOpen && (
        <div className="mobile-drawer">
          {NAV_ITEMS.map(item => (
            <MobileNavSection key={item.label} item={item} setPage={setPage} close={() => setDrawerOpen(false)} />
          ))}
          <div style={{ borderTop:'1px solid var(--light)', paddingTop:24, marginTop:8, display:'flex', flexDirection:'column', gap:16 }}>
            {user ? (
              <>
                <span style={{ fontSize:14, color:'var(--dark)' }}>{user.isPro && <span style={{ fontSize:10, background:'var(--black)', color:'var(--white)', padding:'2px 7px', marginRight:8 }}>PRO</span>}{user.name}</span>

              </>
            ) : null}
          </div>
        </div>
      )}
    </>
  );
}

function MobileNavSection({ item, setPage, close }) {
  const [open, setOpen] = useState(false);
  function go(page) { setPage(page); close(); }
  return (
    <div style={{ borderBottom:'1px solid var(--light)' }}>
      <button onClick={() => item.children ? setOpen(o=>!o) : go(item.label === '品牌故事' ? 'about' : 'info')} style={{
        width:'100%', background:'none', border:'none', cursor:'pointer', display:'flex', justifyContent:'space-between', alignItems:'center',
        padding:'18px 0', fontSize:15, color:'var(--dark)', fontFamily:'var(--font-body)', letterSpacing:'0.04em',
      }}>
        {item.label}
        {item.children && <svg width="10" height="6" viewBox="0 0 10 6" fill="none" style={{ transition:'transform 0.2s', transform: open ? 'rotate(180deg)' : 'none' }}><path d="M1 1l4 4 4-4" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>}
      </button>
      {item.children && open && (
        <div style={{ paddingBottom:8 }}>
          {item.children.map(c => (
            <button key={c} onClick={() => {
              if (item.label === '所有產品') go('shop');
              else if (item.label === '會員登錄') go('login');
              else if (item.label === '購物說明') go('info');
            }} style={{ display:'block', width:'100%', textAlign:'left', background:'none', border:'none', cursor:'pointer', fontFamily:'var(--font-body)', fontSize:13, color:'var(--dark)', padding:'10px 16px', letterSpacing:'0.04em' }}>
              {c}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function HomePage({ setPage, user, cart, setCart, promotions = [] }) {
  const [slide, setSlide] = useState(0);
  const [animating, setAnimating] = useState(false);
  const [selectedProduct, setSelectedProduct] = useState(null);
  const isMobile = useIsMobile();
  const livePromos = promotions.filter(isPromotionLive);

  useEffect(() => {
    const t = setInterval(() => {
      setAnimating(true);
      setTimeout(() => { setSlide(s => (s + 1) % HERO_SLIDES.length); setAnimating(false); }, 450);
    }, 7500);
    return () => clearInterval(t);
  }, []);

  const featured = PRODUCTS.filter(p => !p.isProOnly).slice(0, 4);

  function addToCart(product) {
    setCart(prev => {
      const ex = prev.find(i => i.id === product.id);
      if (ex) return prev.map(i => i.id === product.id ? { ...i, qty: i.qty+1 } : i);
      return [...prev, { ...product, qty:1 }];
    });
  }

  const heroPad = isMobile ? '0 6vw' : '0 10vw';

  if (selectedProduct) {
    return <ProductDetail product={selectedProduct} user={user} onAdd={addToCart} onBack={() => setSelectedProduct(null)} promotions={promotions} />;
  }

    <div>

// ─── PRODUCT DETAIL PAGE ──────────────────────────────────────────────────────
function ProductDetail({ product, user, onAdd, onBack, promotions = [] }) {
  const [qty, setQty] = useState(1);
  const [added, setAdded] = useState(false);
  const isMobile = useIsMobile();
  const showPrice = user?.isPro ? product.proPrice : product.price;

  const livePromosForProduct = (promotions || []).filter(p => isPromotionLive(p) && normProductIds(p).includes(Number(product.id)));
  const primaryPromo = livePromosForProduct[0];

  function handleAdd() {
    for (let i = 0; i < qty; i++) onAdd(product);
    setAdded(true);
    setTimeout(() => setAdded(false), 2000);
  }

  useEffect(() => { window.scrollTo(0, 0); }, []);

  // 通知 Nav 切換到深色模式（避免 navbar 在商品詳情頁還顯示透明白字）

    window.__productDetailOpen = true;
    window.dispatchEvent(new Event('product-detail-toggle'));
    return () => {
      window.__productDetailOpen = false;

    <div style={{ paddingTop:68, minHeight:'100vh', background:'var(--white)' }}>

            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
            返回商品列表
          </button>
        </div>
      </div>

      {/* 主體內容 */}

        <div style={{ display:'grid', gridTemplateColumns: isMobile ? '1fr' : '1fr 1fr', gap: isMobile ? 36 : 72, alignItems:'start' }}>

          {/* 左：圖片 */}
          <div style={{ position: isMobile ? 'static' : 'sticky', top:90 }}>
            <div style={{ position:'relative' }}>
              {product.tag && (
                <div style={{ position:'absolute', top:16, left:16, zIndex:2, background: product.tag==='院線'?'var(--dark)':'var(--gold)', color:'var(--white)', fontSize:10, padding:'4px 10px', letterSpacing:'0.12em' }}>{product.tag}</div>

            <p style={{ fontSize:12, color:'var(--dark)', letterSpacing:'0.1em', marginBottom:28 }}>{product.name} · {product.size}</p>

            {primaryPromo && (
              <div style={{ background:'var(--off-white)', border:'1px solid var(--gold)', padding:'14px 18px', marginBottom:20 }}>

        {/* 下方詳細資訊 */}
        <div style={{ marginTop: isMobile ? 48 : 72, display:'grid', gridTemplateColumns: isMobile ? '1fr' : '1fr 1fr 1fr', gap:1, background:'var(--light)' }}>

// ─── PROMO SECTION (homepage) ────────────────────────────────────────────────
function PromoSection({ promo, user, addToCart, onSelect, isMobile, promotions = [] }) {
  const cd = useCountdown(promo.end_at);
  const ids = normProductIds(promo);
  const items = ids
    .map(id => PRODUCTS.find(p => p.id === id))
    .filter(Boolean)
    .filter(p => !p.isProOnly || user?.isPro);
  if (items.length === 0) {
    return (
      <section style={{ background:'linear-gradient(135deg, #1a1a18 0%, #2a2520 100%)', padding: isMobile ? '40px 0' : '56px 0', color:'var(--white)' }}>
        <div style={{ maxWidth:1280, margin:'0 auto', padding:'0 24px' }} className="px-page">
          <p style={{ fontSize:13, color:'rgba(255,255,255,0.75)', lineHeight:1.7 }}>
            活動「<strong>{promo.name}</strong>」已建立，但目前<strong>沒有可顯示的商品</strong>。
            請到後台確認已勾選商品，且商品編號需與官網一致（一般為 1～8）。
            {ids.length === 0 && '（目前 product_ids 為空）'}
          </p>
        </div>
      </section>
    );
  }

  const formula = `原價 × ${promo.discount_rate}` + (Number(promo.discount_amount) > 0 ? ` − NT$ ${Number(promo.discount_amount).toLocaleString()}` : '');

  return (
    <section style={{ background:'linear-gradient(135deg, #1a1a18 0%, #2a2520 100%)', padding: isMobile ? '60px 0' : '90px 0', color:'var(--white)' }}>
      <div style={{ maxWidth:1280, margin:'0 auto', padding:'0 24px' }} className="px-page">
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom: isMobile ? 28 : 40, flexWrap:'wrap', gap:20 }}>
          <div style={{ flex:1, minWidth:240 }}>
            <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:14 }}>
              <span style={{ background:'var(--gold)', color:'var(--white)', fontSize:10, padding:'3px 10px', letterSpacing:'0.16em', textTransform:'uppercase', fontWeight:500 }}>限時優惠</span>
              <span style={{ fontSize:11, color:'rgba(255,255,255,0.55)', letterSpacing:'0.18em', textTransform:'uppercase' }}>Limited Offer</span>
            </div>
            <h2 style={{ fontFamily:'var(--font-display)', fontSize:'clamp(26px,4vw,46px)', fontWeight:300, lineHeight:1.15, marginBottom:12 }}>{promo.name}</h2>
            {promo.description && (
              <p style={{ fontSize:14, color:'rgba(255,255,255,0.7)', lineHeight:1.7, maxWidth:560, marginBottom:8 }}>{promo.description}</p>
            )}
            <p style={{ fontSize:12, color:'var(--gold)', letterSpacing:'0.1em', marginTop:6 }}>結帳自動套用：{formula}</p>
          </div>

          {/* 倒數 */}
          {cd && !cd.ended && (
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <span style={{ fontSize:10, color:'rgba(255,255,255,0.5)', letterSpacing:'0.16em', textTransform:'uppercase' }}>距離結束</span>
              <div style={{ display:'flex', gap:6 }}>
                {[
                  { v: cd.days, l: '日' },
                  { v: cd.hours, l: '時' },
                  { v: cd.minutes, l: '分' },
                  { v: cd.seconds, l: '秒' },
                ].map((u, i) => (
                  <div key={i} style={{ background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.12)', minWidth:42, padding:'8px 6px', textAlign:'center' }}>
                    <div style={{ fontFamily:'var(--font-display)', fontSize:18, color:'var(--white)', lineHeight:1 }}>{String(u.v).padStart(2,'0')}</div>
                    <div style={{ fontSize:9, color:'rgba(255,255,255,0.5)', marginTop:3 }}>{u.l}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        <div className="g4">
          {items.map(p => (
            <div key={p.id} style={{ background:'var(--white)', color:'var(--black)', padding:14 }}>
              <ProductCard product={p} user={user} onAdd={() => addToCart(p)} onSelect={() => onSelect(p)} promotions={promotions} />
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

// ─── SHOP PAGE ────────────────────────────────────────────────────────────────

// ─── CART PAGE ────────────────────────────────────────────────────────────────
function CartPage({ cart, setCart, setPage, user, promotions = [] }) {
  const isMobile = useIsMobile();
  function updateQty(id, delta) {
    setCart(prev => prev.map(i => i.id===id ? { ...i, qty: Math.max(0, i.qty+delta) } : i).filter(i => i.qty>0));
  }
  const { subtotal, discount, finalSubtotal, promotion } = calculateDiscount(cart, promotions, user);
  const shipping = finalSubtotal >= 3000 ? 0 : 150;
  const grandTotal = finalSubtotal + shipping;

  return (
    <div style={{ paddingTop:68, minHeight:'80vh' }}>
      <div style={{ maxWidth:900, margin:'0 auto', padding: isMobile ? '40px 20px' : '60px 32px' }}>
        <div style={{ display:'flex', alignItems:'baseline', gap:14, marginBottom:40 }}>
          <h1 style={{ fontFamily:'var(--font-display)', fontSize: isMobile ? 30 : 40, fontWeight:300 }}>購物車</h1>
          <span style={{ fontSize:14, color:'var(--dark)' }}>{cart.length} 件商品</span>
        </div>

        {cart.length > 0 && promotions.some(isPromotionLive) && discount === 0 && (
          <div style={{ background:'var(--off-white)', border:'1px solid var(--gold)', padding:'14px 18px', marginBottom:24, fontSize:13, color:'var(--dark)', lineHeight:1.65 }}>
            目前有<strong>限時優惠</strong>，但購物車內還沒有「活動指定商品」，所以尚無折抵。
            <button type="button" onClick={() => setPage('home')} style={{ marginLeft:10, background:'var(--black)', color:'var(--white)', border:'none', padding:'6px 14px', fontSize:11, letterSpacing:'0.08em', cursor:'pointer' }}>回首頁看活動</button>
          </div>
        )}

        {cart.length === 0 ? (
          <div style={{ textAlign:'center', padding:'80px 0' }}>
            <p style={{ fontFamily:'var(--font-display)', fontSize:22, fontWeight:300, color:'var(--dark)', marginBottom:24 }}>購物車是空的</p>
            <button onClick={() => setPage('shop')} style={{ background:'var(--black)', color:'var(--white)', border:'none', padding:'12px 36px', fontSize:12, letterSpacing:'0.15em', cursor:'pointer', fontFamily:'var(--font-body)' }}>繼續購物</button>
          </div>
        ) : (
          <div className="gcart">
            <div>
              {cart.map(item => (
                <div key={item.id} style={{ display:'grid', gridTemplateColumns:'72px 1fr auto', gap:16, alignItems:'center', padding:'20px 0', borderBottom:'1px solid var(--light)' }}>
                  <img src={item.img} alt={item.nameZh} style={{ width:72, height:72, objectFit:'cover', display:'block' }} />
                  <div>
                    <p style={{ fontFamily:'var(--font-display)', fontSize:14, fontWeight:400, marginBottom:3 }}>{item.name}</p>
                    <p style={{ fontSize:12, color:'var(--dark)', marginBottom:10 }}>{item.nameZh} · {item.size}</p>
                    <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                      <button onClick={() => updateQty(item.id,-1)} style={{ width:26, height:26, border:'1px solid var(--light)', background:'none', cursor:'pointer', fontSize:15, lineHeight:1 }}>−</button>
                      <span style={{ fontSize:14, minWidth:20, textAlign:'center' }}>{item.qty}</span>
                      <button onClick={() => updateQty(item.id,1)} style={{ width:26, height:26, border:'1px solid var(--light)', background:'none', cursor:'pointer', fontSize:15, lineHeight:1 }}>+</button>
                    </div>
                  </div>
                  <div style={{ textAlign:'right' }}>
                    <p style={{ fontSize:14, fontWeight:500 }}>NT$ {((user?.isPro ? item.proPrice : item.price)*item.qty).toLocaleString()}</p>
                    <button onClick={() => updateQty(item.id,-item.qty)} style={{ background:'none', border:'none', cursor:'pointer', fontSize:11, color:'var(--dark)', marginTop:6 }}>移除</button>
                  </div>
                </div>
              ))}
            </div>
            <div style={{ background:'var(--off-white)', padding:'28px', height:'fit-content' }}>
              <h3 style={{ fontFamily:'var(--font-display)', fontSize:18, fontWeight:400, marginBottom:20 }}>訂單摘要</h3>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:10, fontSize:13 }}><span>小計</span><span>NT$ {subtotal.toLocaleString()}</span></div>
              {discount > 0 && promotion && (
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:10, fontSize:13, color:'var(--gold)' }}>
                  <span>{promotion.name}</span>
                  <span>−NT$ {discount.toLocaleString()}</span>
                </div>
              )}
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:10, fontSize:13 }}>
                <span>運費</span>
                <span>{shipping === 0 ? <span style={{ color:'var(--gold)' }}>免運</span> : `NT$ ${shipping}`}</span>
              </div>
              <div style={{ height:1, background:'var(--light)', margin:'16px 0' }} />
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:24, fontWeight:500 }}>
                <span style={{ fontSize:14 }}>合計</span>
                <span style={{ fontFamily:'var(--font-display)', fontSize:18 }}>NT$ {grandTotal.toLocaleString()}</span>
              </div>
              <button onClick={() => setPage('checkout')} style={{ width:'100%', background:'var(--black)', color:'var(--white)', border:'none', padding:'15px', fontSize:12, letterSpacing:'0.18em', textTransform:'uppercase', cursor:'pointer', fontFamily:'var(--font-body)', fontWeight:500 }}
                onMouseEnter={e=>e.target.style.background='#333'}
                onMouseLeave={e=>e.target.style.background='var(--black)'}
              >前往結帳</button>
              <p style={{ textAlign:'center', fontSize:11, color:'var(--dark)', marginTop:14 }}>支援：銀行轉帳</p>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── CHECKOUT FIELD (must be outside CheckoutPage to avoid remount on every keystroke) ───
function CheckoutField({ label, name, type, required, placeholder, value, onChange }) {
  return (
    <div>
      <label style={{ fontSize:11, letterSpacing:'0.12em', color:'var(--dark)', textTransform:'uppercase', display:'block', marginBottom:7 }}>
        {label}{required !== false && <span style={{ color:'var(--gold)', marginLeft:3 }}>*</span>}
      </label>
      <input type={type||'text'} value={value} onChange={onChange} required={required !== false} placeholder={placeholder||''}
        style={{ width:'100%', border:'none', borderBottom:'1px solid var(--light)', padding:'10px 0', fontSize:14, fontFamily:'var(--font-body)', outline:'none', background:'none', color:'var(--black)', boxSizing:'border-box' }}
        onFocus={e=>e.target.style.borderBottomColor='var(--black)'}
        onBlur={e=>e.target.style.borderBottomColor='var(--light)'}
      />
    </div>
  );
}

// ─── CHECKOUT PAGE ────────────────────────────────────────────────────────────
function CheckoutPage({ cart, setCart, setPage, user, promotions = [] }) {
  const [step, setStep] = useState(1);
  const [form, setForm] = useState({
    name: user?.name || '', phone:'', email: user?.email || '',
    city:'', district:'', address:'', note:''
  });
  const [orderNo] = useState(() => 'ECL-' + Date.now().toString().slice(-8));
  const [transferLast5, setTransferLast5] = useState('');
  const [transferError, setTransferError] = useState('');
  const isMobile = useIsMobile();

  const { subtotal, discount, finalSubtotal, promotion } = calculateDiscount(cart, promotions, user);
  const shipping = finalSubtotal >= 3000 ? 0 : 150;
  const total = finalSubtotal + shipping;

  const STEPS = ['收件資訊', '確認訂單', '填寫匯款末五碼', '完成'];

  function setField(name) { return e => setForm(f => ({...f, [name]: e.target.value})); }

  const [submitting, setSubmitting] = useState(false);

  // 將訂單寫入 Supabase（雲端，跨裝置同步）
  async function saveOrderToSupabase() {
    const today = new Date();
    const dateStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
    const order = {
      id: orderNo,
      member: form.name || user?.name || '訪客',
      type: user?.isPro ? 'pro' : 'consumer',
      items: cart.map(i => ({ name: i.nameZh, qty: i.qty, price: user?.isPro ? i.proPrice : i.price })),
      total: total,
      subtotal: subtotal,
      discount: discount,
      promotion_id: promotion?.id || null,
      promotion_name: promotion?.name || null,
      status: 'awaiting_confirm',
      date: dateStr,
      address: `${form.city}${form.district}${form.address}`,
      phone: form.phone,
      email: form.email,
      note: form.note,
      transfer_last5: transferLast5,
      user_id: user?.uid || null,
    };
    const { error } = await supabase.from('orders').insert(order);
    if (error) throw error;
  }

  function handleNext(e) {
    e.preventDefault();
    if (step === 1) { window.scrollTo(0,0); setStep(2); }
    else if (step === 2) { window.scrollTo(0,0); setStep(3); }
  }

  async function handleTransferSubmit(e) {
    e.preventDefault();
    if (!/^\d{5}$/.test(transferLast5)) {
      setTransferError('請輸入正確的 5 碼數字');
      return;
    }
    setTransferError('');
    setSubmitting(true);
    try {
      await saveOrderToSupabase();
      setCart([]);
      window.scrollTo(0,0);
      setStep(4);
    } catch (err) {
      console.error(err);
      setTransferError('訂單送出失敗，請稍後再試或聯繫客服。' + (err?.message ? '（' + err.message + '）' : ''));
    } finally {
      setSubmitting(false);
    }
  }

  /* ── Step indicator ── */
  function StepBar() {
    return (
      <div style={{ display:'flex', alignItems:'center', marginBottom:40 }}>
        {STEPS.map((s, i) => (
          <React.Fragment key={s}>
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:6 }}>
              <div style={{ width:28, height:28, borderRadius:'50%', background: step > i ? 'var(--black)' : step === i+1 ? 'var(--black)' : 'var(--light)', color: step >= i+1 ? 'var(--white)' : 'var(--mid)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, fontWeight:500 }}>
                {step > i+1 ? '✓' : i+1}
              </div>
              <span style={{ fontSize:10, letterSpacing:'0.08em', color: step === i+1 ? 'var(--black)' : 'var(--mid)', whiteSpace:'nowrap' }}>{s}</span>
            </div>
            {i < STEPS.length-1 && <div style={{ flex:1, height:1, background: step > i+1 ? 'var(--black)' : 'var(--light)', margin:'0 8px', marginBottom:18 }} />}
          </React.Fragment>
        ))}
      </div>
    );
  }

  /* ── Order summary sidebar ── */
  function OrderSummary() {
    return (
      <div style={{ background:'var(--off-white)', padding:'28px 24px', height:'fit-content' }}>
        <h3 style={{ fontFamily:'var(--font-display)', fontSize:16, fontWeight:400, marginBottom:20, letterSpacing:'0.04em' }}>訂單明細</h3>
        <div style={{ display:'flex', flexDirection:'column', gap:12, marginBottom:18 }}>
          {cart.map(item => {
            const unitPrice = user?.isPro ? item.proPrice : item.price;
            return (
              <div key={item.id} style={{ display:'flex', gap:12, alignItems:'center' }}>
                <div style={{ width:48, height:48, flexShrink:0, position:'relative' }}>
                  <img src={item.img} alt={item.nameZh} style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }} />
                  <div style={{ position:'absolute', top:-6, right:-6, width:18, height:18, borderRadius:'50%', background:'var(--dark)', color:'var(--white)', fontSize:10, display:'flex', alignItems:'center', justifyContent:'center' }}>{item.qty}</div>
                </div>
                <div style={{ flex:1, minWidth:0 }}>
                  <p style={{ fontSize:12, color:'var(--black)', marginBottom:2, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{item.nameZh}</p>
                  <p style={{ fontSize:11, color:'var(--dark)' }}>{item.size}</p>
                </div>
                <span style={{ fontSize:13, color:'var(--black)', flexShrink:0 }}>NT$ {(unitPrice*item.qty).toLocaleString()}</span>
              </div>
            );
          })}
        </div>
        <div style={{ height:1, background:'var(--light)', marginBottom:14 }} />
        <div style={{ display:'flex', justifyContent:'space-between', fontSize:13, color:'var(--dark)', marginBottom:8 }}>
          <span>小計</span><span>NT$ {subtotal.toLocaleString()}</span>
        </div>
        {discount > 0 && promotion && (
          <div style={{ display:'flex', justifyContent:'space-between', fontSize:13, color:'var(--gold)', marginBottom:8 }}>
            <span style={{ display:'flex', alignItems:'center', gap:6 }}>
              <span style={{ background:'var(--gold)', color:'var(--white)', fontSize:9, padding:'1px 5px', letterSpacing:'0.06em' }}>活動</span>
              {promotion.name}
            </span>
            <span>−NT$ {discount.toLocaleString()}</span>
          </div>
        )}
        <div style={{ display:'flex', justifyContent:'space-between', fontSize:13, color:'var(--dark)', marginBottom:14, alignItems:'center' }}>
          <span>運費 <span style={{ fontSize:10, color:'var(--dark)' }}>（宅配到府）</span></span>
          <span>{shipping === 0 ? <span style={{ color:'var(--gold)' }}>免運</span> : `NT$ ${shipping}`}</span>
        </div>
        {finalSubtotal < 3000 && <p style={{ fontSize:11, color:'var(--dark)', marginBottom:14, lineHeight:1.6 }}>消費滿 NT$ 3,000 享免運費，還差 NT$ {(3000-finalSubtotal).toLocaleString()}</p>}
        <div style={{ height:1, background:'var(--light)', marginBottom:14 }} />
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
          <span style={{ fontSize:13, fontWeight:500 }}>合計</span>
          <span style={{ fontFamily:'var(--font-display)', fontSize:20, fontWeight:300 }}>NT$ {total.toLocaleString()}</span>
        </div>
      </div>
    );
  }

  /* ── Step 3: 填寫匯款末五碼 ── */
  if (step === 3) return (
    <div style={{ paddingTop:68 }}>
      <div style={{ maxWidth:960, margin:'0 auto', padding: isMobile ? '40px 20px' : '60px 40px' }}>
        <h1 style={{ fontFamily:'var(--font-display)', fontSize: isMobile ? 28 : 36, fontWeight:300, marginBottom:36 }}>結帳</h1>
        <StepBar />

        <form onSubmit={handleTransferSubmit}>
          <div className="gcheckout">
            <div style={{ display:'flex', flexDirection:'column', gap:20 }}>

              {/* 訂單編號提示 */}
              <div style={{ background:'var(--off-white)', border:'1px solid var(--light)', padding:'16px 20px' }}>
                <p style={{ fontSize:11, letterSpacing:'0.12em', color:'var(--dark)', marginBottom:4 }}>訂單編號</p>
                <p style={{ fontSize:16, fontWeight:500, color:'var(--black)', letterSpacing:'0.06em' }}>{orderNo}</p>
              </div>

              {/* 匯款資訊 */}
              <div style={{ border:'1px solid var(--light)', padding:'20px 24px' }}>
                <p style={{ fontSize:10, letterSpacing:'0.2em', color:'var(--dark)', textTransform:'uppercase', marginBottom:14 }}>請匯款至以下帳戶</p>
                <div style={{ display:'grid', gridTemplateColumns:'auto 1fr', gap:'10px 20px', fontSize:13 }}>
                  {[['銀行','國泰世華 (013)'],['帳號','123-456-789000'],['戶名','ECLADO 保養品有限公司'],['金額',`NT$ ${total.toLocaleString()}`]].map(([k,v]) => (
                    <React.Fragment key={k}>
                      <span style={{ color:'var(--dark)', whiteSpace:'nowrap' }}>{k}</span>
                      <span style={{ color:'var(--black)', fontFamily: k==='帳號' ? 'monospace' : 'inherit', letterSpacing: k==='帳號' ? '0.06em' : 0, fontWeight: k==='金額' ? 600 : 400 }}>{v}</span>
                    </React.Fragment>
                  ))}
                </div>
              </div>

              {/* 末五碼輸入 */}
              <div style={{ border:'2px solid var(--black)', padding:'24px 28px' }}>
                <label style={{ fontSize:11, letterSpacing:'0.16em', color:'var(--black)', textTransform:'uppercase', display:'block', marginBottom:14, fontWeight:500 }}>
                  匯款帳號末五碼 <span style={{ color:'var(--gold)' }}>*</span>
                </label>
                <input
                  type="text"
                  inputMode="numeric"
                  pattern="\d{5}"
                  maxLength={5}
                  value={transferLast5}
                  onChange={e => { setTransferLast5(e.target.value.replace(/\D/g,'').slice(0,5)); setTransferError(''); }}
                  placeholder="• • • • •"
                  required
                  autoFocus
                  style={{
                    width:'100%', border:'none', borderBottom:'2px solid var(--black)',
                    padding:'12px 0', fontSize:32, letterSpacing:'0.4em',
                    fontFamily:'var(--font-body)', outline:'none',
                    background:'none', color:'var(--black)', textAlign:'center', fontWeight:500,
                  }}
                />
                {transferError && (
                  <p style={{ fontSize:12, color:'#c0392b', marginTop:12 }}>{transferError}</p>
                )}
                <p style={{ fontSize:12, color:'var(--dark)', marginTop:14, lineHeight:1.7 }}>
                  ※ 請填入您匯款帳戶的後 5 碼，方便店家對帳<br />
                  ※ 店家確認入帳後，訂單將進入出貨流程
                </p>
              </div>

              <button type="submit" disabled={submitting} style={{ background: submitting ? 'var(--dark)' : 'var(--black)', color:'var(--white)', border:'none', padding:'16px 0', fontSize:12, letterSpacing:'0.18em', textTransform:'uppercase', cursor: submitting ? 'wait' : 'pointer', fontFamily:'var(--font-body)', fontWeight:500, width:'100%', marginTop:8, opacity: submitting ? 0.7 : 1 }}>
                {submitting ? '送出中...' : '送出匯款資訊'}
              </button>
            </div>

            {/* 右側：訂單摘要 */}
            <OrderSummary />
          </div>
        </form>
      </div>
    </div>
  );

  /* ── Step 4: 完成 ── */
  if (step === 4) return (
    <div style={{ paddingTop:68, minHeight:'80vh', display:'flex', alignItems:'center', justifyContent:'center', padding:'60px 20px' }}>
      <div style={{ maxWidth:520, width:'100%' }}>
        <div style={{ textAlign:'center', marginBottom:40 }}>
          <div style={{ width:56, height:56, border:'1px solid var(--black)', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 20px', fontSize:22 }}>✓</div>
          <h2 style={{ fontFamily:'var(--font-display)', fontSize:30, fontWeight:300, marginBottom:10 }}>訂單已送出</h2>
          <p style={{ fontSize:13, color:'var(--dark)' }}>訂單編號：<strong style={{ color:'var(--dark)', letterSpacing:'0.06em' }}>{orderNo}</strong></p>
        </div>

        <div style={{ background:'var(--off-white)', padding:'24px 28px', marginBottom:20 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
            <p style={{ fontSize:10, letterSpacing:'0.2em', color:'var(--dark)', textTransform:'uppercase' }}>匯款資訊</p>
            <span style={{ fontSize:10, background:'var(--gold)', color:'var(--white)', padding:'3px 10px', letterSpacing:'0.1em' }}>待店家確認</span>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'auto 1fr', gap:'8px 20px', fontSize:13 }}>
            <span style={{ color:'var(--dark)' }}>末五碼</span>
            <span style={{ color:'var(--black)', fontWeight:600, letterSpacing:'0.2em' }}>{transferLast5}</span>
            <span style={{ color:'var(--dark)' }}>金額</span>
            <span style={{ color:'var(--black)', fontWeight:500 }}>NT$ {total.toLocaleString()}</span>
          </div>
        </div>

        <div style={{ background:'var(--off-white)', padding:'24px 28px', marginBottom:32 }}>
          <p style={{ fontSize:10, letterSpacing:'0.2em', color:'var(--dark)', textTransform:'uppercase', marginBottom:16 }}>配送資訊</p>
          <div style={{ display:'grid', gridTemplateColumns:'auto 1fr', gap:'8px 20px', fontSize:13 }}>
            {[['收件人',form.name],['手機',form.phone],['地址',`${form.city}${form.district}${form.address}`],['物流','宅配到府（黑貓宅急便）']].map(([k,v]) => (
              <React.Fragment key={k}>
                <span style={{ color:'var(--dark)', whiteSpace:'nowrap' }}>{k}</span>
                <span style={{ color:'var(--black)' }}>{v}</span>
              </React.Fragment>
            ))}
          </div>
        </div>

        <p style={{ fontSize:12, color:'var(--dark)', lineHeight:1.8, marginBottom:28, textAlign:'center' }}>
          您的轉帳末五碼已送出，店家確認入帳後將為您安排出貨。<br />如有疑問請透過官方 LINE 聯繫客服。
        </p>
        <div style={{ display:'flex', gap:12, flexWrap:'wrap' }}>
          <button onClick={() => setPage('shop')} style={{ flex:1, background:'none', border:'1px solid var(--black)', color:'var(--black)', padding:'13px 0', fontSize:12, letterSpacing:'0.14em', cursor:'pointer', fontFamily:'var(--font-body)' }}>繼續購物</button>
          <button onClick={() => setPage('home')} style={{ flex:1, background:'var(--black)', color:'var(--white)', border:'none', padding:'13px 0', fontSize:12, letterSpacing:'0.14em', cursor:'pointer', fontFamily:'var(--font-body)' }}>返回首頁</button>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{ paddingTop:68 }}>
      <div style={{ maxWidth:960, margin:'0 auto', padding: isMobile ? '40px 20px' : '60px 40px' }}>
        <h1 style={{ fontFamily:'var(--font-display)', fontSize: isMobile ? 28 : 36, fontWeight:300, marginBottom:36 }}>結帳</h1>
        <StepBar />

        <form onSubmit={handleNext}>
          <div className="gcheckout">
            {/* 左側：表單 */}
            <div>

              {/* Step 1: 收件資訊 */}
              {step === 1 && (
                <div style={{ display:'flex', flexDirection:'column', gap:20 }}>

                  <div style={{ background:'var(--off-white)', border:'1px solid var(--light)', padding:'16px 20px', display:'flex', alignItems:'center', gap:14 }}>
                    <div style={{ width:36, height:36, background:'var(--black)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="1.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </div>
                    <div>
                      <p style={{ fontSize:12, fontWeight:500, color:'var(--black)', marginBottom:2 }}>宅配到府</p>
                      <p style={{ fontSize:11, color:'var(--dark)' }}>黑貓宅急便 · 運費 NT$ 150（滿 NT$ 3,000 免運）</p>
                    </div>
                  </div>

                  <div style={{ display:'grid', gridTemplateColumns: isMobile ? '1fr' : '1fr 1fr', gap:20 }}>
                    <CheckoutField label="收件人姓名" name="name" value={form.name} onChange={setField('name')} />
                    <CheckoutField label="手機號碼" name="phone" type="tel" placeholder="09xx-xxx-xxx" value={form.phone} onChange={setField('phone')} />
                  </div>
                  <CheckoutField label="電子信箱" name="email" type="email" value={form.email} onChange={setField('email')} />

                  <div>
                    <label style={{ fontSize:11, letterSpacing:'0.12em', color:'var(--dark)', textTransform:'uppercase', display:'block', marginBottom:7 }}>收件地址 <span style={{ color:'var(--gold)' }}>*</span></label>
                    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:12 }}>
                      {[['city','縣市'],['district','區域']].map(([k,ph]) => (

// ─── LOGIN PAGE ───────────────────────────────────────────────────────────────
function LoginPage({ setPage }) {
  const [view, setView]         = useState('login'); // 'login' | 'register' | 'forgot'
  const [email, setEmail]       = useState('');
  const [password, setPassword] = useState('');
  const [confirm, setConfirm]   = useState('');
  const [name, setName]         = useState('');
  const [phone, setPhone]       = useState('');
  const [loading, setLoading]   = useState(false);
  const [error, setError]       = useState('');
  const [success, setSuccess]   = useState('');

  function reset() { setError(''); setSuccess(''); }

  // ── 登入 ──
  async function handleSignIn(e) {
    e.preventDefault(); reset(); setLoading(true);
    try {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) { setError(sbError(error.message)); return; }
      setPage('shop');
    } catch(err) { setError('網路異常，請確認連線'); }
    finally { setLoading(false); }
  }

  // ── 註冊 ──
  async function handleRegister(e) {
    e.preventDefault(); reset();
    if (password !== confirm) { setError('兩次密碼不一致'); return; }
    setLoading(true);
    try {
      const { data, error } = await supabase.auth.signUp({
        email, password,
        options: { data: { name, phone, role: 'consumer' } }
      });
      if (error) { setError(sbError(error.message)); return; }
      // 補一筆 profiles 資料（trigger 也會做，但這裡明確帶上 phone）
      if (data?.user?.id) {
        await supabase.from('profiles').upsert({
          id: data.user.id,
          email, name, phone, role: 'consumer',
        });
      }
      setSuccess('✓ 驗證信已發送！請查收 ' + email + ' 並點擊驗證連結後再登入。');
      setView('login');
    } catch(err) { setError('網路異常，請確認連線'); }
    finally { setLoading(false); }
  }

  // ── 忘記密碼 ──
  async function handleForgot(e) {
    e.preventDefault(); reset(); setLoading(true);
    try {
      const { error } = await supabase.auth.resetPasswordForEmail(email);
      if (error) { setError(sbError(error.message)); return; }
      setSuccess('✓ 密碼重設信已發送至 ' + email + '，請查收信箱。');
    } catch(err) { setError('網路異常，請確認連線'); }
    finally { setLoading(false); }
  }

  const inputStyle = { width:'100%', border:'none', borderBottom:'1px solid var(--light)', padding:'9px 0', fontSize:15, fontFamily:'var(--font-body)', outline:'none', background:'none', color:'var(--dark)' };

  return (
    <div style={{ minHeight:'100vh', display:'flex' }}>
      {/* Left visual */}
      <div className="login-visual" style={{ flex:1, display:'flex', flexDirection:'column', justifyContent:'center', alignItems:'center', background:'var(--black)', padding:60, position:'relative', overflow:'hidden' }}>
        <img src="https://images.unsplash.com/photo-1571781926291-c477ebfd024b?w=900&q=85&fit=crop" alt="" style={{ position:'absolute', top:0, left:0, width:'100%', height:'100%', objectFit:'cover', opacity:0.35 }} />
        <div style={{ position:'relative', zIndex:1, textAlign:'center' }}>
          <div style={{ fontFamily:'var(--font-display)', fontSize:26, letterSpacing:'0.22em', color:'var(--white)', marginBottom:6 }}>ECLADO</div>
          <div style={{ fontSize:9, letterSpacing:'0.3em', color:'var(--gold)', marginBottom:40, textTransform:'uppercase' }}>Korean Cosmeceuticals</div>
          <p style={{ fontFamily:'var(--font-display)', fontSize:30, fontWeight:300, color:'var(--white)', lineHeight:1.4, marginBottom:20 }}>Professional<br />Skincare.</p>
          <p style={{ fontSize:13, color:'rgba(255,255,255,0.4)', lineHeight:1.9 }}>登入後享有完整購物體驗<br />美容師會員可查看院線專業商品</p>
        </div>
      </div>

      {/* Right form */}
      <div style={{ width:'100%', maxWidth:480, display:'flex', flexDirection:'column', justifyContent:'center', padding:'60px 32px', background:'var(--white)', overflowY:'auto' }}>
        <div style={{ marginBottom:28 }}>
          <div style={{ fontFamily:'var(--font-display)', fontSize:20, letterSpacing:'0.2em', color:'var(--black)', marginBottom:4 }}>ECLADO</div>
          <div style={{ fontSize:9, letterSpacing:'0.26em', color:'var(--gold)', textTransform:'uppercase' }}>Korean Cosmeceuticals</div>
        </div>

        {/* Tabs — 登入 / 註冊 (hidden on forgot view) */}
        {view !== 'forgot' && (
          <div style={{ display:'flex', marginBottom:32, borderBottom:'1px solid var(--light)' }}>
            {[['login','登入'],['register','註冊會員']].map(([v,label]) => (
              <button key={v} onClick={() => { setView(v); reset(); }} style={{ background:'none', border:'none', cursor:'pointer', fontFamily:'var(--font-body)', fontSize:14, padding:'11px 0', marginRight:28, color: view===v ? 'var(--black)' : 'var(--dark)', borderBottom: view===v ? '1px solid var(--black)' : '1px solid transparent', letterSpacing:'0.04em', fontWeight: view===v ? 500 : 300 }}>{label}</button>
            ))}
          </div>
        )}

        {/* 忘記密碼 header */}
        {view === 'forgot' && (
          <div style={{ marginBottom:28 }}>
            <button onClick={() => { setView('login'); reset(); }} style={{ background:'none', border:'none', cursor:'pointer', fontSize:12, color:'var(--dark)', fontFamily:'var(--font-body)', letterSpacing:'0.06em', padding:0, marginBottom:16 }}>← 返回登入</button>
            <h2 style={{ fontFamily:'var(--font-display)', fontSize:22, fontWeight:300, color:'var(--black)' }}>忘記密碼</h2>
            <p style={{ fontSize:13, color:'var(--dark)', marginTop:8, lineHeight:1.7 }}>輸入您的 Email，我們將發送密碼重設連結。</p>
          </div>
        )}

        {/* 成功訊息 */}
        {success && (
          <div style={{ background:'#f0faf0', border:'1px solid #b7ddb7', padding:'14px 16px', marginBottom:20, fontSize:13, color:'#2d6a2d', lineHeight:1.7 }}>{success}</div>
        )}

        {/* 錯誤訊息 */}
        {error && (
          <div style={{ background:'#fff5f5', border:'1px solid #f5c0c0', padding:'14px 16px', marginBottom:20, fontSize:13, color:'#c0392b', lineHeight:1.7 }}>{error}</div>
        )}

        {/* 登入表單 */}
        {view === 'login' && (
          <form onSubmit={handleSignIn} style={{ display:'flex', flexDirection:'column', gap:22 }}>
            <div>
              <label style={{ fontSize:11, letterSpacing:'0.14em', color:'var(--dark)', textTransform:'uppercase', display:'block', marginBottom:9 }}>Email</label>
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} required style={inputStyle}
                onFocus={e=>e.target.style.borderBottomColor='var(--dark)'}
                onBlur={e=>e.target.style.borderBottomColor='var(--light)'} />
            </div>
            <div>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:9 }}>
                <label style={{ fontSize:11, letterSpacing:'0.14em', color:'var(--dark)', textTransform:'uppercase' }}>密碼</label>
                <button type="button" onClick={() => { setView('forgot'); reset(); }} style={{ background:'none', border:'none', cursor:'pointer', fontSize:12, color:'var(--dark)', fontFamily:'var(--font-body)', letterSpacing:'0.04em', textDecoration:'underline', textUnderlineOffset:3 }}>忘記密碼？</button>
              </div>
              <input type="password" value={password} onChange={e=>setPassword(e.target.value)} required style={inputStyle}
                onFocus={e=>e.target.style.borderBottomColor='var(--dark)'}
                onBlur={e=>e.target.style.borderBottomColor='var(--light)'} />
            </div>
            <button type="submit" disabled={loading} style={{ width:'100%', background: loading ? 'var(--mid)' : 'var(--black)', color:'var(--white)', border:'none', padding:'15px', fontSize:12, letterSpacing:'0.2em', textTransform:'uppercase', cursor: loading ? 'default' : 'pointer', fontFamily:'var(--font-body)', fontWeight:500, marginTop:4 }}>
              {loading ? '登入中...' : '登入'}
            </button>
          </form>
        )}

        {/* 註冊表單 */}
        {view === 'register' && (
          <form onSubmit={handleRegister} style={{ display:'flex', flexDirection:'column', gap:22 }}>
            <div>
              <label style={{ fontSize:11, letterSpacing:'0.14em', color:'var(--dark)', textTransform:'uppercase', display:'block', marginBottom:9 }}>姓名</label>
              <input type="text" value={name} onChange={e=>setName(e.target.value)} required style={inputStyle}
                onFocus={e=>e.target.style.borderBottomColor='var(--dark)'}
                onBlur={e=>e.target.style.borderBottomColor='var(--light)'} />
            </div>
            <div>
              <label style={{ fontSize:11, letterSpacing:'0.14em', color:'var(--dark)', textTransform:'uppercase', display:'block', marginBottom:9 }}>手機</label>
              <input type="tel" value={phone} onChange={e=>setPhone(e.target.value)} required placeholder="09xx-xxx-xxx" style={inputStyle}
                onFocus={e=>e.target.style.borderBottomColor='var(--dark)'}
                onBlur={e=>e.target.style.borderBottomColor='var(--light)'} />
            </div>
            <div>
              <label style={{ fontSize:11, letterSpacing:'0.14em', color:'var(--dark)', textTransform:'uppercase', display:'block', marginBottom:9 }}>Email</label>
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} required style={inputStyle}
                onFocus={e=>e.target.style.borderBottomColor='var(--dark)'}
                onBlur={e=>e.target.style.borderBottomColor='var(--light)'} />
            </div>
            <div>
              <label style={{ fontSize:11, letterSpacing:'0.14em', color:'var(--dark)', textTransform:'uppercase', display:'block', marginBottom:9 }}>密碼（至少 6 位）</label>
              <input type="password" value={password} onChange={e=>setPassword(e.target.value)} required minLength={6} style={inputStyle}
                onFocus={e=>e.target.style.borderBottomColor='var(--dark)'}
                onBlur={e=>e.target.style.borderBottomColor='var(--light)'} />
            </div>
            <div>
              <label style={{ fontSize:11, letterSpacing:'0.14em', color:'var(--dark)', textTransform:'uppercase', display:'block', marginBottom:9 }}>確認密碼</label>
              <input type="password" value={confirm} onChange={e=>setConfirm(e.target.value)} required style={inputStyle}
                onFocus={e=>e.target.style.borderBottomColor='var(--dark)'}
                onBlur={e=>e.target.style.borderBottomColor='var(--light)'} />
            </div>
            <button type="submit" disabled={loading} style={{ width:'100%', background: loading ? 'var(--mid)' : 'var(--black)', color:'var(--white)', border:'none', padding:'15px', fontSize:12, letterSpacing:'0.2em', textTransform:'uppercase', cursor: loading ? 'default' : 'pointer', fontFamily:'var(--font-body)', fontWeight:500, marginTop:4 }}>
              {loading ? '建立中...' : '建立帳號'}
            </button>
          </form>
        )}

        {/* 忘記密碼表單 */}
        {view === 'forgot' && (
          <form onSubmit={handleForgot} style={{ display:'flex', flexDirection:'column', gap:22 }}>
            <div>
              <label style={{ fontSize:11, letterSpacing:'0.14em', color:'var(--dark)', textTransform:'uppercase', display:'block', marginBottom:9 }}>Email</label>
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} required style={inputStyle}
                onFocus={e=>e.target.style.borderBottomColor='var(--dark)'}
                onBlur={e=>e.target.style.borderBottomColor='var(--light)'} />
            </div>
            <button type="submit" disabled={loading} style={{ width:'100%', background: loading ? 'var(--mid)' : 'var(--black)', color:'var(--white)', border:'none', padding:'15px', fontSize:12, letterSpacing:'0.2em', textTransform:'uppercase', cursor: loading ? 'default' : 'pointer', fontFamily:'var(--font-body)', fontWeight:500 }}>
              {loading ? '發送中...' : '發送重設密碼信'}
            </button>
          </form>
        )}

        {/* LINE 登入分隔線 */}
        {view !== 'forgot' && (
          <>
            <div style={{ display:'flex', alignItems:'center', gap:14, margin:'24px 0' }}>
              <div style={{ flex:1, height:1, background:'var(--light)' }} />
              <span style={{ fontSize:11, color:'var(--dark)', letterSpacing:'0.1em' }}>或</span>
              <div style={{ flex:1, height:1, background:'var(--light)' }} />
            </div>
            <button style={{ width:'100%', background:'#00B900', color:'var(--white)', border:'none', padding:'14px', fontSize:13, letterSpacing:'0.08em', cursor:'pointer', fontFamily:'var(--font-body)', fontWeight:500, display:'flex', alignItems:'center', justifyContent:'center', gap:10, opacity:0.6 }} title="即將推出">

/** 首頁／商店頂部：載入失敗或「有資料但沒進行中」時給人看得懂的提示 */
function PromoDiagnosticBar({ status, errorText, promotions }) {
  if (status === 'loading') {
    return (
      <div role="status" style={{ marginTop:68, background:'#f4f3f1', borderBottom:'1px solid var(--light)', padding:'10px 20px', textAlign:'center', fontSize:12, color:'var(--dark)', letterSpacing:'0.04em' }}>
        正在載入優惠活動…
      </div>
    );
  }
  if (status === 'error') {
    return (
      <div role="alert" style={{ marginTop:68, background:'#fef2f2', borderBottom:'1px solid #fecaca', padding:'12px 20px', fontSize:13, color:'#991b1b', lineHeight:1.65, textAlign:'center' }}>
        <strong>優惠活動無法載入</strong>（網站其餘功能仍可使用）。<br />
        <span style={{ fontSize:12, opacity:0.95 }}>{errorText || '未知錯誤'}</span><br />
        <span style={{ fontSize:11, color:'#7f1d1d', marginTop:6, display:'inline-block' }}>
          請到 Supabase 確認已執行 <code style={{ background:'#fee2e2', padding:'1px 6px' }}>eclado/supabase-promotions.sql</code>，且 <strong>public.promotions</strong> 的 RLS 允許 <strong>anon 讀取（SELECT）</strong>。
        </span>
      </div>
    );
  }
  const total = promotions.length;
  const live = promotions.filter(isPromotionLive);
  if (total > 0 && live.length === 0) {
    return (
      <div role="status" style={{ marginTop:68, background:'#fffbeb', borderBottom:'1px solid #fde68a', padding:'12px 20px', fontSize:13, color:'#92400e', lineHeight:1.65, textAlign:'center' }}>
        <strong>已載入 {total} 個活動，但目前沒有任何一檔在「進行中」</strong>，所以首頁不會出現限時優惠區、購物車也不會折抵。<br />
        <span style={{ fontSize:12 }}>請到後台「活動管理」檢查：① <strong>啟用</strong> 已勾選 ② <strong>開始時間</strong> 已到（或留空＝立即）③ <strong>結束時間</strong> 未到（或留空＝不結束）④ 已勾選 <strong>參與商品</strong>。</span>
      </div>
    );
  }
  return null;
}

function App() {
  const [page, setPage] = useState('home');
  const [user, setUser] = useState(null);
  const [cart, setCart] = useState([]);
  const [promotions, setPromotions] = useState([]);
  const [promoFetchStatus, setPromoFetchStatus] = useState('loading'); // 先顯示載入中，避免空白誤判
  const [promoFetchError, setPromoFetchError] = useState('');
  const cartCount = cart.reduce((sum,i) => sum+i.qty, 0);

  // 從 profiles 表讀取角色
  async function loadUser(supabaseUser) {
    const { data } = await supabase
      .from('profiles')
      .select('role')
      .eq('id', supabaseUser.id)
      .single();
    setUser({
      name: supabaseUser.email.split('@')[0],
      email: supabaseUser.email,
      isPro: data?.role === 'pro',
      uid: supabaseUser.id,
    });
  }

  // 監聽 Supabase 登入狀態
  useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) loadUser(session.user);
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
      if (session?.user) loadUser(session.user);
      else setUser(null);
    });
    return () => subscription.unsubscribe();
  }, []);

  // 載入進行中的活動（含 realtime 同步）
  useEffect(() => {
    if (!window.supabase || typeof window.supabase.from !== 'function') {
      setPromoFetchStatus('error');
      setPromoFetchError('Supabase 未初始化（請重新整理或檢查 script 是否被擋）');
      setPromotions([]);
      return;
    }
    const sb = window.supabase;

    async function loadPromotions() {
      setPromoFetchStatus('loading');
      setPromoFetchError('');
      let { data, error } = await sb.from('promotions').select('*').order('created_at', { ascending: false });
      // 若資料表沒有 created_at 或排序失敗，改不排序再試一次
      if (error) {
        const r2 = await sb.from('promotions').select('*');
        data = r2.data;
        error = r2.error;
      }
      if (error) {
        console.error('[ECLADO] 無法載入 promotions：', error.message, error);
        setPromotions([]);
        setPromoFetchStatus('error');
        setPromoFetchError(error.message || String(error.code || ''));
        return;
      }
      setPromotions(data || []);
      setPromoFetchStatus('ok');
    }
    loadPromotions();
    let ch = null;
    try {
      ch = sb
        .channel('promotions-realtime')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'promotions' }, loadPromotions)
        .subscribe();
    } catch (e) {
      console.warn('[ECLADO] Realtime 訂閱失敗（不影響讀取）', e);
    }
    return () => { if (ch) sb.removeChannel(ch); };
  }, []);

  // 網址列 #eclado-promotions 時捲到活動區（例如從商店頁「回首頁看活動」）
  useEffect(() => {
    if (window.location.hash !== '#eclado-promotions') return;
    const t = setTimeout(() => {
      document.getElementById('eclado-promotions')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 400);
    return () => clearTimeout(t);
  }, [promotions]);

  function handleSignOut() {
    supabase.auth.signOut();
    setUser(null);
  }

  function renderPage() {
    switch (page) {
      case 'home':     return <HomePage setPage={setPage} user={user} cart={cart} setCart={setCart} promotions={promotions} />;
      case 'shop':     return <ShopPage user={user} cart={cart} setCart={setCart} promotions={promotions} />;
      case 'cart':     return <CartPage cart={cart} setCart={setCart} setPage={setPage} user={user} promotions={promotions} />;
      case 'checkout': return <CheckoutPage cart={cart} setCart={setCart} setPage={setPage} user={user} promotions={promotions} />;
      case 'login':    return <LoginPage setPage={setPage} />;
      case 'about':    return <AboutPage />;
      case 'info':     return <InfoPage />;
      default:         return <HomePage setPage={setPage} user={user} cart={cart} setCart={setCart} promotions={promotions} />;
    }
  }

  const showPromoBar = page !== 'login';

  return (
    <>
      {page !== 'login' && <Nav setPage={setPage} cartCount={cartCount} user={user} setUser={handleSignOut} page={page} />}
      {showPromoBar && (
        <PromoDiagnosticBar status={promoFetchStatus} errorText={promoFetchError} promotions={promotions} />
      )}
      {renderPage()}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
