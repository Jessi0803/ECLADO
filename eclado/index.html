// ─── NAV ITEM (desktop dropdown) ─────────────────────────────────────────────
function NavItem({ item, scrolled, setPage }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);

  function go(child) {
    setOpen(false);
    if (item.label === '所有產品') setPage('shop');
    else if (item.label === '會員登錄') setPage('login');
    else if (item.label === '品牌故事') setPage('about');
    else if (item.label === '購物說明') setPage('info');
  }

  const col = scrolled ? 'var(--dark)' : 'rgba(255,255,255,0.88)';
  return (
    <div ref={ref} style={{ position:'relative' }}
      onMouseEnter={() => item.children && setOpen(true)}
      onMouseLeave={() => setOpen(false)}>
      <button onClick={() => item.children ? setOpen(o=>!o) : go()} style={{
        background:'none', border:'none', cursor:'pointer',
        fontFamily:'var(--font-body)', fontSize:13, fontWeight:400,
        letterSpacing:'0.06em', color:col, padding:'8px 18px',
        display:'flex', alignItems:'center', gap:5, height:68, whiteSpace:'nowrap',
        transition:'color 0.3s',
      }}>
        {item.label}
        {item.children && (
          <svg width="10" height="6" viewBox="0 0 10 6" fill="none" style={{ transition:'transform 0.2s', transform: open ? 'rotate(180deg)' : 'none' }}>
            <path d="M1 1l4 4 4-4" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/>
          </svg>
        )}
      </button>
      {item.children && open && (
        <div style={{
          position:'absolute', top:'100%', left:'50%', transform:'translateX(-50%)',
          background:'rgba(250,250,249,0.98)', backdropFilter:'blur(16px)',
          border:'1px solid var(--light)', minWidth:160,
          boxShadow:'0 8px 32px rgba(0,0,0,0.08)', zIndex:200, padding:'8px 0',
          animation:'fadeInDown 0.18s ease',
        }}>
          {item.children.map(c => (
            <button key={c} onClick={() => go(c)} style={{
              display:'block', width:'100%', textAlign:'left', background:'none', border:'none',
              cursor:'pointer', fontFamily:'var(--font-body)', fontSize:13, color:'var(--dark)',
              padding:'11px 22px', letterSpacing:'0.04em', transition:'background 0.15s',
            }}
            onMouseEnter={e => { e.target.style.background='var(--off-white)'; e.target.style.color='var(--black)'; }}
            onMouseLeave={e => { e.target.style.background='none'; e.target.style.color='var(--dark)'; }}
            >{c}</button>
          ))}
        </div>
      )}
    </div>
  );
}

              </div>
            ) : null}
            <button onClick={() => setPage('cart')} style={{ background:'none', border:'none', cursor:'pointer', fontSize:13, color:iconCol, fontFamily:'var(--font-body)', letterSpacing:'0.04em', position:'relative', padding:'4px 0', whiteSpace:'nowrap' }}>

                  <span style={{ display:'block', width:16, height:1.5, background: darkMode ? 'var(--dark)' : 'var(--white)' }}/>
                  <span style={{ display:'block', width:22, height:1.5, background: darkMode ? 'var(--dark)' : 'var(--white)' }}/>
                </>
              )}

          </div>
        </div>
      </nav>

      {/* Mobile drawer */}
      {drawerOpen && (
        <div className="mobile-drawer">
          {NAV_ITEMS.map(item => (
            <MobileNavSection key={item.label} item={item} setPage={setPage} close={() => setDrawerOpen(false)} />
          ))}
          <div style={{ borderTop:'1px solid var(--light)', paddingTop:24, marginTop:8, display:'flex', flexDirection:'column', gap:16 }}>

              </>

          </div>
        </div>
      )}
    </>
  );
}

function MobileNavSection({ item, setPage, close }) {
  const [open, setOpen] = useState(false);
  function go(page) { setPage(page); close(); }
  return (
    <div style={{ borderBottom:'1px solid var(--light)' }}>
      <button onClick={() => item.children ? setOpen(o=>!o) : go(item.label === '品牌故事' ? 'about' : 'info')} style={{
        width:'100%', background:'none', border:'none', cursor:'pointer', display:'flex', justifyContent:'space-between', alignItems:'center',
        padding:'18px 0', fontSize:15, color:'var(--dark)', fontFamily:'var(--font-body)', letterSpacing:'0.04em',
      }}>
        {item.label}
        {item.children && <svg width="10" height="6" viewBox="0 0 10 6" fill="none" style={{ transition:'transform 0.2s', transform: open ? 'rotate(180deg)' : 'none' }}><path d="M1 1l4 4 4-4" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>}
      </button>
      {item.children && open && (
        <div style={{ paddingBottom:8 }}>
          {item.children.map(c => (
            <button key={c} onClick={() => {
              if (item.label === '所有產品') go('shop');
              else if (item.label === '會員登錄') go('login');
              else if (item.label === '購物說明') go('info');
            }} style={{ display:'block', width:'100%', textAlign:'left', background:'none', border:'none', cursor:'pointer', fontFamily:'var(--font-body)', fontSize:13, color:'var(--mid)', padding:'10px 16px', letterSpacing:'0.04em' }}>
              {c}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

  function handleAdd() {
    for (let i = 0; i < qty; i++) onAdd(product);
    setAdded(true);
    setTimeout(() => setAdded(false), 2000);
  }

  useEffect(() => { window.scrollTo(0, 0); }, []);

  return (
    <div style={{ paddingTop:68, minHeight:'100vh', background:'var(--white)' }}>

              <button onClick={handleAdd} style={{ flex:1, minWidth:180, height:48, background: added ? 'var(--gold)' : 'var(--black)', color:'var(--white)', border:'none', cursor:'pointer', fontFamily:'var(--font-body)', fontSize:12, letterSpacing:'0.16em', textTransform:'uppercase', transition:'background 0.3s' }}>

      </div>
    </div>

// ─── PRODUCT CARD ─────────────────────────────────────────────────────────────

  return (
    <div onClick={onSelect} onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)} style={{ cursor:'pointer', position:'relative' }}>
      {product.tag && (
        <div style={{ position:'absolute', top:10, left:10, zIndex:2, background: product.tag==='院線'?'var(--dark)':'var(--gold)', color:'var(--white)', fontSize:10, padding:'3px 9px', letterSpacing:'0.1em' }}>{product.tag}</div>
      )}
      <div style={{ position:'relative', overflow:'hidden', marginBottom:14 }}>

        <div style={{ position:'absolute', bottom:0, left:0, right:0, background:'var(--black)', padding:'10px', transform: hovered?'translateY(0)':'translateY(100%)', transition:'transform 0.25s' }}>

      </div>
      <div>
        <p style={{ fontSize:10, letterSpacing:'0.14em', color:'var(--dark)', textTransform:'uppercase', marginBottom:5 }}>{product.category}</p>

        <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
          <span style={{ fontSize:15, fontWeight:500, color:'var(--black)' }}>NT$ {showPrice.toLocaleString()}</span>

}

// ─── SHOP PAGE ────────────────────────────────────────────────────────────────
function ShopPage({ user, cart, setCart }) {
  const [activeCategory, setActiveCategory] = useState('全部');
  const [selectedProduct, setSelectedProduct] = useState(null);
  const categories = ['全部', ...NAV_LINKS];
  const isMobile = useIsMobile();

  function addToCart(product) {
    setCart(prev => {
      const ex = prev.find(i => i.id === product.id);
      if (ex) return prev.map(i => i.id === product.id ? { ...i, qty: i.qty+1 } : i);
      return [...prev, { ...product, qty:1 }];
    });
  }

  const filtered = PRODUCTS.filter(p => {
    if (p.isProOnly && !user?.isPro) return false;
    if (activeCategory === '全部') return true;
    return p.category === activeCategory;
  });

  if (selectedProduct) {
    return <ProductDetail product={selectedProduct} user={user} onAdd={addToCart} onBack={() => setSelectedProduct(null)} />;
  }

  return (
    <div style={{ paddingTop:68 }}>
      {/* 頂部 header */}
      <div style={{ position:'relative', height: isMobile ? 180 : 240, overflow:'hidden' }}>
        <img src="https://images.unsplash.com/photo-1631730359585-38a4935cbec4?w=1600&q=80&fit=crop" alt="" style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover', objectPosition:'center 60%' }} />
        <div style={{ position:'absolute', inset:0, background:'rgba(12,12,10,0.58)' }} />
        <div style={{ position:'relative', height:'100%', maxWidth:1280, margin:'0 auto', padding: isMobile ? '0 24px' : '0 32px', display:'flex', alignItems:'flex-end', justifyContent:'space-between', flexWrap:'wrap', gap:12, paddingBottom: isMobile ? 28 : 36 }}>
          <div>
            <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:12 }}>
              <div style={{ width:28, height:1, background:'var(--gold)' }} />
              <p style={{ fontSize:10, letterSpacing:'0.3em', color:'var(--gold)', textTransform:'uppercase', margin:0 }}>Shop</p>
            </div>
            <h1 style={{ fontFamily:'var(--font-display)', fontSize: isMobile ? 28 : 42, fontWeight:300, color:'var(--white)', lineHeight:1.1, margin:0 }}>全部商品</h1>
          </div>
          {user?.isPro && (
            <div style={{ display:'flex', alignItems:'center', gap:8, paddingBottom:4 }}>
              <span style={{ fontSize:10, background:'var(--gold)', color:'var(--black)', padding:'3px 8px', letterSpacing:'0.12em', fontWeight:600 }}>PRO</span>
              <span style={{ fontSize:12, color:'rgba(255,255,255,0.6)', letterSpacing:'0.04em' }}>美容師專業折扣已啟用</span>
            </div>
          )}
        </div>
      </div>
      {/* 分類篩選列 */}
      <div className="filter-tabs" style={{ background:'var(--off-white)', borderBottom:'1px solid var(--light)', padding: isMobile ? '0 16px' : '0 32px' }}>
        <div style={{ maxWidth:1280, margin:'0 auto', display:'flex' }}>
          {categories.map(cat => (
            <button key={cat} onClick={() => setActiveCategory(cat)} style={{
              background:'none', border:'none', cursor:'pointer', fontFamily:'var(--font-body)', fontSize:12,
              color: activeCategory===cat ? 'var(--black)' : 'var(--dark)',
              padding:'16px 20px', letterSpacing:'0.08em', textTransform:'uppercase',
              borderBottom: activeCategory===cat ? '2px solid var(--black)' : '2px solid transparent',
              fontWeight: activeCategory===cat ? 500 : 300, transition:'all 0.2s',
            }}>{cat}</button>
          ))}
        </div>

      <div style={{ maxWidth:1280, margin:'0 auto', padding: isMobile ? '40px 20px' : '60px 32px' }}>

}

// ─── CART PAGE ────────────────────────────────────────────────────────────────
function CartPage({ cart, setCart, setPage }) {
  const isMobile = useIsMobile();
  function updateQty(id, delta) {
    setCart(prev => prev.map(i => i.id===id ? { ...i, qty: Math.max(0, i.qty+delta) } : i).filter(i => i.qty>0));
  }
  const total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);

  return (
    <div style={{ paddingTop:68, minHeight:'80vh' }}>
      <div style={{ maxWidth:900, margin:'0 auto', padding: isMobile ? '40px 20px' : '60px 32px' }}>
        <div style={{ display:'flex', alignItems:'baseline', gap:14, marginBottom:40 }}>

          <span style={{ fontSize:14, color:'var(--mid)' }}>{cart.length} 件商品</span>

        {cart.length === 0 ? (

          </div>
        ) : (
          <div className="gcart">
            <div>
              {cart.map(item => (
                <div key={item.id} style={{ display:'grid', gridTemplateColumns:'72px 1fr auto', gap:16, alignItems:'center', padding:'20px 0', borderBottom:'1px solid var(--light)' }}>
                  <img src={item.img} alt={item.nameZh} style={{ width:72, height:72, objectFit:'cover', display:'block' }} />
                  <div>
                    <p style={{ fontFamily:'var(--font-display)', fontSize:14, fontWeight:400, marginBottom:3 }}>{item.name}</p>
                    <p style={{ fontSize:12, color:'var(--mid)', marginBottom:10 }}>{item.nameZh} · {item.size}</p>
                    <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                      <button onClick={() => updateQty(item.id,-1)} style={{ width:26, height:26, border:'1px solid var(--light)', background:'none', cursor:'pointer', fontSize:15, lineHeight:1 }}>−</button>
                      <span style={{ fontSize:14, minWidth:20, textAlign:'center' }}>{item.qty}</span>
                      <button onClick={() => updateQty(item.id,1)} style={{ width:26, height:26, border:'1px solid var(--light)', background:'none', cursor:'pointer', fontSize:15, lineHeight:1 }}>+</button>
                    </div>
                  </div>
                  <div style={{ textAlign:'right' }}>
                    <p style={{ fontSize:14, fontWeight:500 }}>NT$ {(item.price*item.qty).toLocaleString()}</p>
                    <button onClick={() => updateQty(item.id,-item.qty)} style={{ background:'none', border:'none', cursor:'pointer', fontSize:11, color:'var(--mid)', marginTop:6 }}>移除</button>
                  </div>
                </div>
              ))}
            </div>
            <div style={{ background:'var(--off-white)', padding:'28px', height:'fit-content' }}>
              <h3 style={{ fontFamily:'var(--font-display)', fontSize:18, fontWeight:400, marginBottom:20 }}>訂單摘要</h3>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:10, fontSize:13 }}><span>小計</span><span>NT$ {total.toLocaleString()}</span></div>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:10, fontSize:13 }}><span>運費</span><span style={{ color:'var(--mid)' }}>NT$ 150</span></div>
              <div style={{ height:1, background:'var(--light)', margin:'16px 0' }} />
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:24, fontWeight:500 }}>
                <span style={{ fontSize:14 }}>合計</span>
                <span style={{ fontFamily:'var(--font-display)', fontSize:18 }}>NT$ {(total+150).toLocaleString()}</span>
              </div>
              <button onClick={() => setPage('checkout')} style={{ width:'100%', background:'var(--black)', color:'var(--white)', border:'none', padding:'15px', fontSize:12, letterSpacing:'0.18em', textTransform:'uppercase', cursor:'pointer', fontFamily:'var(--font-body)', fontWeight:500 }}
                onMouseEnter={e=>e.target.style.background='#333'}
                onMouseLeave={e=>e.target.style.background='var(--black)'}
              >前往結帳</button>
              <p style={{ textAlign:'center', fontSize:11, color:'var(--mid)', marginTop:14 }}>支援：銀行轉帳</p>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function LoginPage({ setPage }) {
  const [view, setView]         = useState('login'); // 'login' | 'register' | 'forgot'
  const [email, setEmail]       = useState('');
  const [password, setPassword] = useState('');
  const [confirm, setConfirm]   = useState('');
  const [loading, setLoading]   = useState(false);
  const [error, setError]       = useState('');
  const [success, setSuccess]   = useState('');

  function reset() { setError(''); setSuccess(''); }

  // ── 登入 ──
  async function handleSignIn(e) {
    e.preventDefault(); reset(); setLoading(true);
    try {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) { setError(sbError(error.message)); return; }
      setPage('shop');
    } catch(err) { setError('網路異常，請確認連線'); }
    finally { setLoading(false); }
  }

  // ── 註冊 ──
  async function handleRegister(e) {
    e.preventDefault(); reset();
    if (password !== confirm) { setError('兩次密碼不一致'); return; }
    setLoading(true);
    try {
      const { error } = await supabase.auth.signUp({ email, password });
      if (error) { setError(sbError(error.message)); return; }
      setSuccess('✓ 驗證信已發送！請查收 ' + email + ' 並點擊驗證連結後再登入。');
      setView('login');
    } catch(err) { setError('網路異常，請確認連線'); }
    finally { setLoading(false); }
  }

  // ── 忘記密碼 ──
  async function handleForgot(e) {
    e.preventDefault(); reset(); setLoading(true);
    try {
      const { error } = await supabase.auth.resetPasswordForEmail(email);
      if (error) { setError(sbError(error.message)); return; }
      setSuccess('✓ 密碼重設信已發送至 ' + email + '，請查收信箱。');
    } catch(err) { setError('網路異常，請確認連線'); }
    finally { setLoading(false); }
  }

  const inputStyle = { width:'100%', border:'none', borderBottom:'1px solid var(--light)', padding:'9px 0', fontSize:15, fontFamily:'var(--font-body)', outline:'none', background:'none', color:'var(--dark)' };

  return (
    <div style={{ minHeight:'100vh', display:'flex' }}>

      <div className="login-visual" style={{ flex:1, display:'flex', flexDirection:'column', justifyContent:'center', alignItems:'center', background:'var(--black)', padding:60, position:'relative', overflow:'hidden' }}>

          <p style={{ fontFamily:'var(--font-display)', fontSize:30, fontWeight:300, color:'var(--white)', lineHeight:1.4, marginBottom:20 }}>Professional<br />Skincare.</p>
          <p style={{ fontSize:13, color:'rgba(255,255,255,0.4)', lineHeight:1.9 }}>登入後享有完整購物體驗<br />美容師會員可查看院線專業商品</p>

      {/* Right form */}

          <h1 style={{ fontFamily:'var(--font-display)', fontSize: isMobile ? 30 : 44, fontWeight:300, color:'var(--black)', marginBottom:32 }}>購物說明</h1>
          <div className="info-tabs">
            {Object.keys(sections).map(key => (
              <button key={key} onClick={() => setActive(key)} style={{ background:'none', border:'none', cursor:'pointer', fontFamily:'var(--font-body)', fontSize:13, color: active===key ? 'var(--black)' : 'var(--mid)', padding:'13px 20px 13px 0', marginRight:4, borderBottom: active===key ? '2px solid var(--black)' : '2px solid transparent', letterSpacing:'0.06em', fontWeight: active===key ? 500 : 300 }}>{key}</button>
            ))}
          </div>
        </div>
      </div>
      <div style={{ maxWidth:900, margin:'0 auto', padding: isMobile ? '40px 20px' : '60px 32px' }}>
        <h2 style={{ fontFamily:'var(--font-display)', fontSize: isMobile ? 22 : 28, fontWeight:300, marginBottom:32, color:'var(--black)' }}>{current.title}</h2>
        {current.content.map((item,i) => (
          <div key={i} style={{ display:'grid', gridTemplateColumns: isMobile ? '1fr' : '180px 1fr', gap: isMobile ? 8 : 32, padding:'24px 0', borderBottom:'1px solid var(--light)' }}>
            <div style={{ fontSize:13, fontWeight:500, color:'var(--black)', letterSpacing:'0.04em' }}>{item.q}</div>
            <div style={{ fontSize:14, color:'#555', lineHeight:1.9, whiteSpace:'pre-line' }}>{item.a}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('home');
  const [user, setUser] = useState(null);
  const [cart, setCart] = useState([]);
  const cartCount = cart.reduce((sum,i) => sum+i.qty, 0);

  // 從 profiles 表讀取角色
  async function loadUser(supabaseUser) {
    const { data } = await supabase
      .from('profiles')
      .select('role')
      .eq('id', supabaseUser.id)
      .single();
    setUser({
      name: supabaseUser.email.split('@')[0],
      email: supabaseUser.email,
      isPro: data?.role === 'pro',
      uid: supabaseUser.id,
    });
  }

  // 監聽 Supabase 登入狀態
  useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) loadUser(session.user);
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
      if (session?.user) loadUser(session.user);
      else setUser(null);
    });
    return () => subscription.unsubscribe();
  }, []);

  function handleSignOut() {
    supabase.auth.signOut();
    setUser(null);
  }

  function renderPage() {
    switch (page) {
      case 'home':     return <HomePage setPage={setPage} user={user} cart={cart} setCart={setCart} />;
      case 'shop':     return <ShopPage user={user} cart={cart} setCart={setCart} />;
      case 'cart':     return <CartPage cart={cart} setCart={setCart} setPage={setPage} />;
      case 'checkout': return <CheckoutPage cart={cart} setCart={setCart} setPage={setPage} />;
      case 'login':    return <LoginPage setPage={setPage} />;
      case 'about':    return <AboutPage />;
      case 'info':     return <InfoPage />;
      default:         return <HomePage setPage={setPage} user={user} cart={cart} setCart={setCart} />;
    }
  }

  return (
    <>
      {page !== 'login' && <Nav setPage={setPage} cartCount={cartCount} user={user} setUser={handleSignOut} page={page} />}
      {renderPage()}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
