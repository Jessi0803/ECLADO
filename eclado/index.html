<style>

    --white: #fafaf9;

    --dark: #2a2a28;

  html { font-size: 16px; scroll-behavior: smooth; }

  /* Chinese body text */
  p, span, button, a, label, input, textarea { font-family: 'Jost', 'Noto Serif TC', sans-serif; }
  #root { min-height: 100vh; }

  @keyframes fadeInDown {
    from { opacity: 0; transform: translateX(-50%) translateY(-6px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* Stripe placeholder pattern */
  .img-placeholder {
    background-color: var(--light);
    background-image: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 4px,
      var(--mid) 4px,
      var(--mid) 5px

    display: flex; align-items: center; justify-content: center;

</style>

<body>
<div id="root"></div>
<script type="text/babel">

// ─── DATA ────────────────────────────────────────────────────────────────────

const PRODUCTS = [

  { id: 3, name: 'SOS Ampoule Set', nameZh: '急救修護安瓶組', category: '急救安瓶', size: '5ml×6', price: 4800, proPrice: 3600, isProOnly: false, tag: '',

  { id: 4, name: 'Intensive Hydra Mask', nameZh: '密集保濕面膜', category: '面膜', size: '35ml×10', price: 2200, proPrice: 1650, isProOnly: false, tag: '',
    img: 'https://images.unsplash.com/photo-1629198688000-71f23e745b6e?w=600&q=80&fit=crop' },
  { id: 5, name: 'Eye Contour Complex', nameZh: '眼周緊緻精華', category: '眼霜', size: '30ml', price: 2800, proPrice: 2100, isProOnly: false, tag: '',
    img: 'https://images.unsplash.com/photo-1571781926291-c477ebfd024b?w=600&q=80&fit=crop' },
  { id: 6, name: 'Cell Recovery Cream', nameZh: '細胞修護乳霜', category: '面霜', size: '50g', price: 3600, proPrice: 2700, isProOnly: false, tag: '暢銷',
    img: 'https://images.unsplash.com/photo-1612817288484-6f916006741a?w=600&q=80&fit=crop' },
  { id: 7, name: 'NK Cell Activator', nameZh: 'NK細胞活化安瓶', category: '急救安瓶', size: '3.5ml×10', price: 8800, proPrice: 6600, isProOnly: true, tag: '院線',
    img: 'https://images.unsplash.com/photo-1608248597279-f99d160bfcbc?w=600&q=80&fit=crop' },
  { id: 8, name: 'AHA/BHA Peeling Gel', nameZh: 'AHA·BHA·PHA 煥膚凝膠', category: '清潔', size: '120ml', price: 1980, proPrice: 1485, isProOnly: false, tag: '',
    img: 'https://images.unsplash.com/photo-1631390737500-0d64c52c7aa4?w=600&q=80&fit=crop' },
];

const HERO_SLIDES = [
  {
    headline: 'Science\nMeets Skin.',
    sub: '韓國醫美院線 × 台灣專業代理',
    cta: '探索系列',
    img: 'https://images.unsplash.com/photo-1629732097571-b042b35aa3ed?w=1800&q=85&fit=crop',
    layout: 'left',
    accent: 'New Collection 2026',
  },
  {
    headline: 'Precision\nFormula.',
    sub: '細胞級修護，皮膚科醫師驗證',

  },

// ─── NAV ITEM with dropdown ────────────────────────────────────────────────
function NavItem({ item, scrolled, setPage }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);

  React.useEffect(() => {
    function handler(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  function handleChildClick(child) {
    setOpen(false);
    if (item.label === '所有產品') { setPage('shop'); }
    else if (item.label === '會員登錄') {
      if (child === '一般會員') setPage('login');
      else if (child === '美容師專區') setPage('login');
    }
    else if (item.label === '品牌故事') { setPage('about'); }
    else if (item.label === '購物說明') { setPage('info'); }
  }

  function handleMainClick() {
    if (!item.children) {
      if (item.label === '品牌故事') setPage('about');
      return;
    }
    setOpen(o => !o);
  }

  const textColor = scrolled ? 'var(--dark)' : 'rgba(255,255,255,0.88)';

  return (
    <div ref={ref} style={{ position: 'relative' }}
      onMouseEnter={() => item.children && setOpen(true)}
      onMouseLeave={() => setOpen(false)}
    >
      <button onClick={handleMainClick} style={{
        background: 'none', border: 'none', cursor: 'pointer',
        fontFamily: 'var(--font-body)', fontSize: 13, fontWeight: 400,
        letterSpacing: '0.06em', color: textColor,
        padding: '8px 18px', display: 'flex', alignItems: 'center', gap: 5,
        transition: 'color 0.3s', height: 68,
      }}>
        {item.label}
        {item.children && (
          <svg width="10" height="6" viewBox="0 0 10 6" fill="none" style={{ transition: 'transform 0.2s', transform: open ? 'rotate(180deg)' : 'rotate(0deg)' }}>
            <path d="M1 1l4 4 4-4" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/>
          </svg>
        )}
      </button>

      {item.children && open && (
        <div style={{
          position: 'absolute', top: '100%', left: '50%', transform: 'translateX(-50%)',
          background: 'rgba(250,250,249,0.98)', backdropFilter: 'blur(16px)',
          border: '1px solid var(--light)', minWidth: 160,
          boxShadow: '0 8px 32px rgba(0,0,0,0.08)',
          zIndex: 200, padding: '8px 0',
          animation: 'fadeInDown 0.18s ease',
        }}>
          {item.children.map(child => (
            <button key={child} onClick={() => handleChildClick(child)} style={{
              display: 'block', width: '100%', textAlign: 'left',
              background: 'none', border: 'none', cursor: 'pointer',
              fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--dark)',
              padding: '11px 22px', letterSpacing: '0.04em',
              transition: 'background 0.15s, color 0.15s',
            }}
            onMouseEnter={e => { e.target.style.background = 'var(--off-white)'; e.target.style.color = 'var(--black)'; }}
            onMouseLeave={e => { e.target.style.background = 'none'; e.target.style.color = 'var(--dark)'; }}
            >{child}</button>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── COMPONENTS ──────────────────────────────────────────────────────────────

function StripePlaceholder({ width, height, label, style = {} }) {
  return (
    <div className="img-placeholder" style={{ width, height, ...style }}>
      <span style={{ fontFamily: 'var(--font-body)', fontSize: 10, letterSpacing: '0.1em', color: '#aaa', textTransform: 'uppercase' }}>{label}</span>
    </div>
  );
}

function Nav({ page, setPage, cartCount, user, setUser }) {
  const [menuOpen, setMenuOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);

  useEffect(() => {
    const handler = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', handler);
    return () => window.removeEventListener('scroll', handler);
  }, []);

  return (
    <nav style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
      background: scrolled ? 'rgba(250,250,249,0.96)' : 'rgba(0,0,0,0)',
      backdropFilter: scrolled ? 'blur(12px)' : 'none',
      borderBottom: scrolled ? '1px solid var(--light)' : '1px solid rgba(255,255,255,0.1)',
      transition: 'all 0.4s ease',
    }}>
      <div style={{ maxWidth: 1280, margin: '0 auto', padding: '0 32px', height: 68, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        {/* Logo */}
        <div onClick={() => setPage('home')} style={{ cursor: 'pointer', display: 'flex', flexDirection: 'column', gap: 1 }}>
          <span style={{ fontFamily: 'var(--font-display)', fontSize: 22, fontWeight: 400, letterSpacing: '0.22em', color: scrolled ? 'var(--black)' : 'var(--white)' }}>ECLADO</span>
          <span style={{ fontSize: 9, letterSpacing: '0.28em', color: 'var(--gold)', textTransform: 'uppercase', fontWeight: 400 }}>Korean Cosmeceuticals</span>
        </div>

        {/* Center nav with dropdowns */}
        <div style={{ display: 'flex', gap: 0, alignItems: 'center' }}>
          {NAV_ITEMS.map(item => (
            <NavItem key={item.label} item={item} scrolled={scrolled} setPage={setPage} />
          ))}
        </div>

        {/* Right icons */}
        <div style={{ display: 'flex', gap: 20, alignItems: 'center' }}>
          {user ? (
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              {user.isPro && (
                <span style={{ fontSize: 10, letterSpacing: '0.1em', background: scrolled ? 'var(--black)' : 'rgba(255,255,255,0.15)', color: 'var(--white)', padding: '3px 8px', fontWeight: 500 }}>PRO</span>
              )}
              <button onClick={() => setPage('account')} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 13, color: scrolled ? 'var(--dark)' : 'rgba(255,255,255,0.85)', fontFamily: 'var(--font-body)' }}>
                {user.name}
              </button>
              <button onClick={() => setUser(null)} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 12, color: scrolled ? 'var(--mid)' : 'rgba(255,255,255,0.5)', fontFamily: 'var(--font-body)' }}>登出</button>
            </div>
          ) : (
            <button onClick={() => setPage('login')} style={{
              background: 'none', border: 'none', cursor: 'pointer',
              fontSize: 13, color: scrolled ? 'var(--dark)' : 'rgba(255,255,255,0.85)', fontFamily: 'var(--font-body)',
              letterSpacing: '0.04em', transition: 'color 0.3s', whiteSpace: 'nowrap',
            }}>登入 / 註冊</button>
          )}
          <button onClick={() => setPage('cart')} style={{
            background: 'none', border: 'none', cursor: 'pointer',
            fontSize: 13, color: scrolled ? 'var(--dark)' : 'rgba(255,255,255,0.85)', fontFamily: 'var(--font-body)',
            letterSpacing: '0.04em', position: 'relative', padding: '4px 0', transition: 'color 0.3s', whiteSpace: 'nowrap',
          }}>
            購物車
            {cartCount > 0 && (
              <span style={{
                position: 'absolute', top: -4, right: -14,
                background: 'var(--black)', color: 'var(--white)',
                fontSize: 9, width: 16, height: 16,
                borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>{cartCount}</span>
            )}
          </button>
        </div>
      </div>
    </nav>
  );
}

// ─── HOME PAGE ─────────────────────────────────────────────────────────────
function HomePage({ setPage, user, cart, setCart }) {
  const [slide, setSlide] = useState(0);
  const [animating, setAnimating] = useState(false);

  useEffect(() => {
    const t = setInterval(() => {
      setAnimating(true);
      setTimeout(() => { setSlide(s => (s + 1) % HERO_SLIDES.length); setAnimating(false); }, 450);
    }, 6000);
    return () => clearInterval(t);
  }, []);

  const featured = PRODUCTS.filter(p => !p.isProOnly).slice(0, 4);

  function addToCart(product) {
    setCart(prev => {
      const existing = prev.find(i => i.id === product.id);
      if (existing) return prev.map(i => i.id === product.id ? { ...i, qty: i.qty + 1 } : i);
      return [...prev, { ...product, qty: 1 }];
    });
  }

  return (
    <div>
      {/* HERO */}
      <section style={{ height: '100vh', position: 'relative', overflow: 'hidden', background: '#1a1a18' }}>

        {/* BG image — transitions between slides */}
        {HERO_SLIDES.map((s, i) => (
          <img key={i} src={s.img} alt="" style={{
            position: 'absolute', top: 0, left: 0, width: '100%', height: '100%',
            objectFit: 'cover', objectPosition: 'center',
            opacity: i === slide ? 1 : 0,
            transition: 'opacity 0.9s ease',
            pointerEvents: 'none',
          }} />
        ))}

        {/* === LAYOUT 1: LEFT — full bleed, text left === */}
        {HERO_SLIDES[slide].layout === 'left' && (
          <>
            <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to right, rgba(14,14,12,0.88) 45%, rgba(14,14,12,0.15))' }} />
            <div style={{
              position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column',
              justifyContent: 'center', padding: '0 10vw', maxWidth: 780,
              opacity: animating ? 0 : 1, transition: 'opacity 0.45s ease',
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 20 }}>
                <div style={{ width: 36, height: 1, background: 'var(--gold)' }} />
                <span style={{ fontSize: 10, letterSpacing: '0.34em', color: 'var(--gold)', textTransform: 'uppercase', fontFamily: 'var(--font-body)' }}>{HERO_SLIDES[slide].accent}</span>
              </div>
              <h1 style={{
                fontFamily: 'var(--font-display)', fontSize: 'clamp(56px, 7.5vw, 104px)',
                fontWeight: 300, color: 'var(--white)', lineHeight: 1.0,
                letterSpacing: '-0.01em', whiteSpace: 'pre-line', marginBottom: 28,
              }}>{HERO_SLIDES[slide].headline}</h1>
              <p style={{ fontSize: 14, color: 'rgba(255,255,255,0.55)', letterSpacing: '0.1em', marginBottom: 48, fontWeight: 300 }}>
                {HERO_SLIDES[slide].sub}
              </p>
              <div style={{ display: 'flex', gap: 16 }}>
                <button onClick={() => setPage('shop')} style={{ background: 'var(--white)', color: 'var(--black)', border: 'none', padding: '14px 32px', fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', cursor: 'pointer', fontFamily: 'var(--font-body)', fontWeight: 500, transition: 'all 0.2s', whiteSpace: 'nowrap' }}
                  onMouseEnter={e => { e.target.style.background='var(--gold)'; e.target.style.color='var(--white)'; }}
                  onMouseLeave={e => { e.target.style.background='var(--white)'; e.target.style.color='var(--black)'; }}
                >{HERO_SLIDES[slide].cta}</button>
                <button onClick={() => setPage('login')} style={{ background: 'transparent', color: 'var(--white)', border: '1px solid rgba(255,255,255,0.35)', padding: '14px 32px', fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', cursor: 'pointer', fontFamily: 'var(--font-body)', transition: 'all 0.2s', whiteSpace: 'nowrap' }}
                  onMouseEnter={e => e.target.style.borderColor='var(--white)'}
                  onMouseLeave={e => e.target.style.borderColor='rgba(255,255,255,0.35)'}
                >美容師專區</button>
              </div>
            </div>
          </>
        )}

        {/* === LAYOUT 2: CENTER — text centered, dark vignette === */}
        {HERO_SLIDES[slide].layout === 'center' && (
          <>
            <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(ellipse at center, rgba(14,14,12,0.5) 0%, rgba(14,14,12,0.82) 100%)' }} />
            <div style={{
              position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column',
              justifyContent: 'center', alignItems: 'center', textAlign: 'center', padding: '0 8vw',
              opacity: animating ? 0 : 1, transition: 'opacity 0.45s ease',
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 24 }}>
                <div style={{ width: 24, height: 1, background: 'var(--gold)' }} />
                <span style={{ fontSize: 10, letterSpacing: '0.34em', color: 'var(--gold)', textTransform: 'uppercase', fontFamily: 'var(--font-body)' }}>{HERO_SLIDES[slide].accent}</span>
                <div style={{ width: 24, height: 1, background: 'var(--gold)' }} />
              </div>
              <h1 style={{
                fontFamily: 'var(--font-display)', fontSize: 'clamp(52px, 8vw, 112px)',
                fontWeight: 300, color: 'var(--white)', lineHeight: 1.0,
                letterSpacing: '0.02em', whiteSpace: 'pre-line', marginBottom: 28,
              }}>{HERO_SLIDES[slide].headline}</h1>
              <p style={{ fontSize: 14, color: 'rgba(255,255,255,0.5)', letterSpacing: '0.14em', marginBottom: 52, fontWeight: 300, maxWidth: 440 }}>
                {HERO_SLIDES[slide].sub}
              </p>
              <button onClick={() => setPage('shop')} style={{ background: 'transparent', color: 'var(--white)', border: '1px solid rgba(255,255,255,0.6)', padding: '15px 44px', fontSize: 11, letterSpacing: '0.14em', textTransform: 'uppercase', cursor: 'pointer', fontFamily: 'var(--font-body)', transition: 'all 0.25s', whiteSpace: 'nowrap' }}
                onMouseEnter={e => { e.target.style.background='var(--white)'; e.target.style.color='var(--black)'; }}
                onMouseLeave={e => { e.target.style.background='transparent'; e.target.style.color='var(--white)'; }}
              >{HERO_SLIDES[slide].cta}</button>
            </div>
          </>
        )}

        {/* === LAYOUT 3: SPLIT — left dark panel + right image === */}
        {HERO_SLIDES[slide].layout === 'split' && (
          <>
            <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to left, rgba(14,14,12,0.1) 40%, rgba(14,14,12,0.92) 70%)' }} />
            <div style={{
              position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column',
              justifyContent: 'center', alignItems: 'flex-end', padding: '0 10vw',
              opacity: animating ? 0 : 1, transition: 'opacity 0.45s ease',
            }}>
              <div style={{ maxWidth: 520, textAlign: 'right' }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: 12, marginBottom: 20 }}>
                  <span style={{ fontSize: 10, letterSpacing: '0.34em', color: 'var(--gold)', textTransform: 'uppercase', fontFamily: 'var(--font-body)' }}>{HERO_SLIDES[slide].accent}</span>
                  <div style={{ width: 36, height: 1, background: 'var(--gold)' }} />
                </div>
                <h1 style={{
                  fontFamily: 'var(--font-display)', fontSize: 'clamp(48px, 6.5vw, 92px)',
                  fontWeight: 300, color: 'var(--white)', lineHeight: 1.05,
                  letterSpacing: '-0.01em', whiteSpace: 'pre-line', marginBottom: 24,
                }}>{HERO_SLIDES[slide].headline}</h1>
                <p style={{ fontSize: 14, color: 'rgba(255,255,255,0.5)', letterSpacing: '0.1em', marginBottom: 44, fontWeight: 300 }}>
                  {HERO_SLIDES[slide].sub}

function ProductCard({ product, user, onAdd, setPage }) {
  const [hovered, setHovered] = useState(false);

  return (
    <div
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{ cursor: 'pointer', position: 'relative' }}

      {product.tag && (
        <div style={{
          position: 'absolute', top: 12, left: 12, zIndex: 2,
          background: product.tag === '院線' ? 'var(--dark)' : 'var(--gold)',

      )}

      {/* Image */}
      <div style={{ position: 'relative', overflow: 'hidden', marginBottom: 16 }}>

        <div style={{
          position: 'absolute', bottom: 0, left: 0, right: 0,
          background: 'var(--black)', padding: '12px',
          transform: hovered ? 'translateY(0)' : 'translateY(100%)',
          transition: 'transform 0.25s ease',

          <button onClick={e => { e.stopPropagation(); onAdd(); }} style={{
            width: '100%', background: 'none', border: 'none', cursor: 'pointer',
            color: 'var(--white)', fontSize: 11, letterSpacing: '0.15em',
            textTransform: 'uppercase', fontFamily: 'var(--font-body)', padding: '4px 0',
          }}>加入購物車</button>
        </div>
      </div>

      {/* Info */}
      <div>
        <p style={{ fontSize: 10, letterSpacing: '0.15em', color: 'var(--mid)', textTransform: 'uppercase', marginBottom: 6 }}>{product.category}</p>
        <p style={{ fontFamily: 'var(--font-display)', fontSize: 16, fontWeight: 400, color: 'var(--black)', marginBottom: 2, lineHeight: 1.3 }}>{product.name}</p>
        <p style={{ fontSize: 12, color: 'var(--mid)', marginBottom: 10 }}>{product.nameZh} · {product.size}</p>

              專業價

  );
}

// ─── SHOP PAGE ─────────────────────────────────────────────────────────────
function ShopPage({ user, cart, setCart }) {
  const [activeCategory, setActiveCategory] = useState('全部');
  const categories = ['全部', ...NAV_LINKS];

  function addToCart(product) {
    setCart(prev => {
      const existing = prev.find(i => i.id === product.id);
      if (existing) return prev.map(i => i.id === product.id ? { ...i, qty: i.qty + 1 } : i);
      return [...prev, { ...product, qty: 1 }];
    });
  }

  const filtered = PRODUCTS.filter(p => {
    if (p.isProOnly && !user?.isPro) return false;
    if (activeCategory === '全部') return true;
    return p.category === activeCategory;
  });

  return (
    <div style={{ paddingTop: 68 }}>
      {/* Header */}
      <div style={{ background: 'var(--off-white)', padding: '64px 32px 48px', textAlign: 'center', borderBottom: '1px solid var(--light)' }}>
        <p style={{ fontSize: 11, letterSpacing: '0.28em', color: 'var(--gold)', textTransform: 'uppercase', marginBottom: 12 }}>Shop</p>
        <h1 style={{ fontFamily: 'var(--font-display)', fontSize: 44, fontWeight: 300, color: 'var(--black)', lineHeight: 1.1 }}>全部商品</h1>
      </div>

      {/* Filter tabs */}
      <div style={{ background: 'var(--white)', borderBottom: '1px solid var(--light)', padding: '0 32px', display: 'flex', gap: 0, justifyContent: 'center' }}>
        {categories.map(cat => (
          <button key={cat} onClick={() => setActiveCategory(cat)} style={{
            background: 'none', border: 'none', cursor: 'pointer',
            fontFamily: 'var(--font-body)', fontSize: 13, color: activeCategory === cat ? 'var(--black)' : 'var(--mid)',
            padding: '20px 24px', letterSpacing: '0.06em',
            borderBottom: activeCategory === cat ? '1px solid var(--black)' : '1px solid transparent',
            transition: 'all 0.2s', fontWeight: activeCategory === cat ? 500 : 300,
          }}>{cat}</button>
        ))}
      </div>

      {/* Products */}
      <div style={{ maxWidth: 1280, margin: '0 auto', padding: '60px 32px' }}>
        {user?.isPro && (
          <div style={{ background: 'var(--dark)', color: 'var(--white)', padding: '12px 20px', marginBottom: 40, display: 'flex', alignItems: 'center', gap: 12 }}>
            <span style={{ fontSize: 10, background: 'var(--gold)', color: 'var(--black)', padding: '2px 8px', letterSpacing: '0.1em', fontWeight: 500 }}>PRO</span>
            <span style={{ fontSize: 13, letterSpacing: '0.06em' }}>您已登入美容師帳號，可查看院線商品及專業折扣價格</span>
          </div>
        )}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 32 }}>
          {filtered.map(product => (
            <ProductCard key={product.id} product={product} user={user} onAdd={() => addToCart(product)} />
          ))}
        </div>
        {filtered.length === 0 && (
          <div style={{ textAlign: 'center', padding: '80px 0', color: 'var(--mid)', fontSize: 14 }}>此分類目前無商品</div>
        )}
      </div>
    </div>
  );
}

  }
  const total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);

        </div>
      </div>
      <div style={{ maxWidth: 900, margin: '0 auto', padding: '60px 32px' }}>
        <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 28, fontWeight: 300, marginBottom: 40, color: 'var(--black)' }}>{current.title}</h2>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
          {current.content.map((item, i) => (
            <div key={i} style={{ display: 'grid', gridTemplateColumns: '200px 1fr', gap: 32, padding: '28px 0', borderBottom: '1px solid var(--light)' }}>
              <div style={{ fontSize: 13, fontWeight: 500, color: 'var(--black)', letterSpacing: '0.04em', paddingTop: 2 }}>{item.q}</div>
              <div style={{ fontSize: 14, color: '#555', lineHeight: 1.9, whiteSpace: 'pre-line' }}>{item.a}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('home');
  const [user, setUser] = useState(null);
  const [cart, setCart] = useState([]);

  const cartCount = cart.reduce((sum, i) => sum + i.qty, 0);

  function renderPage() {
    switch (page) {
      case 'home': return <HomePage setPage={setPage} user={user} cart={cart} setCart={setCart} />;
      case 'shop': return <ShopPage user={user} cart={cart} setCart={setCart} />;
      case 'cart': return <CartPage cart={cart} setCart={setCart} setPage={setPage} />;
      case 'checkout': return <CheckoutPage cart={cart} setCart={setCart} setPage={setPage} />;
      case 'login': return <LoginPage setUser={setUser} setPage={setPage} />;
      case 'about': return <AboutPage />;
      case 'info': return <InfoPage setPage={setPage} />;
      default: return <HomePage setPage={setPage} user={user} cart={cart} setCart={setCart} />;
    }
  }

  return (
    <>
      {page !== 'login' && (
        <Nav page={page} setPage={setPage} cartCount={cartCount} user={user} setUser={setUser} />
      )}
      {renderPage()}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
