<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECLADO — 韓國醫美院線保養</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Jost:wght@200;300;400;500;600&family=Noto+Serif+TC:wght@200;300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --white: #fafaf9;
    --off-white: #f4f3f1;
    --light: #ebebea;
    --mid: #c8c7c5;
    --dark: #2a2a28;
    --black: #141412;
    --gold: #b8a98a;
    --font-display: 'Gilda Display', Georgia, serif;
    --font-body: 'Jost', 'Noto Serif TC', Helvetica, sans-serif;
    --font-zh: 'Noto Serif TC', serif;
  }
  html { font-size: 16px; scroll-behavior: smooth; }
  body { background: var(--white); color: var(--dark); font-family: 'Jost', 'Noto Serif TC', Helvetica, sans-serif; font-weight: 300; -webkit-font-smoothing: antialiased; }
  h1, h2, h3 { font-family: 'Gilda Display', 'Noto Serif TC', Georgia, serif; }
  p, span, button, a, label, input, textarea { font-family: 'Jost', 'Noto Serif TC', sans-serif; }
  #root { min-height: 100vh; }

  @keyframes fadeInDown {
    from { opacity: 0; transform: translateX(-50%) translateY(-6px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .img-placeholder {
    background-color: var(--light);
    background-image: repeating-linear-gradient(-45deg, transparent, transparent 4px, var(--mid) 4px, var(--mid) 5px);
    display: flex; align-items: center; justify-content: center;
    color: var(--mid); font-size: 11px; letter-spacing: 0.08em; text-align: center; padding: 8px;
  }

  /* ── Responsive grid classes ── */
  .g4   { display: grid; grid-template-columns: repeat(4,1fr); gap: 24px; }
  .g4lg { display: grid; grid-template-columns: repeat(4,1fr); gap: 32px; }
  .g2   { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
  .g3   { display: grid; grid-template-columns: repeat(3,1fr); gap: 32px; }
  .gfooter { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 48px; margin-bottom: 48px; }
  .gcart    { display: grid; grid-template-columns: 1fr 320px; gap: 48px; }
  .gcheckout{ display: grid; grid-template-columns: 1fr 320px; gap: 60px; }
  .gstats   { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 360px; }
  .gabout   { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; margin-bottom: 80px; }

  /* Nav */
  .nav-desktop { display: flex; gap: 0; align-items: center; }
  .nav-right    { display: flex; gap: 20px; align-items: center; }
  .nav-hamburger{ display: none; background: none; border: none; cursor: pointer; padding: 8px; }
  .mobile-drawer{
    position: fixed; top: 68px; left: 0; right: 0; bottom: 0;
    background: var(--white); z-index: 99; overflow-y: auto;
    animation: slideDown 0.22s ease; padding: 24px 28px 48px;
  }

  /* Filter tabs scroll on mobile */
  .filter-tabs { display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .filter-tabs button { white-space: nowrap; flex-shrink: 0; }

  /* Info tabs scroll */
  .info-tabs { display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .info-tabs::-webkit-scrollbar { display: none; }
  .info-tabs button { white-space: nowrap; flex-shrink: 0; }

  /* ── Tablet ── */
  @media (max-width: 900px) {
    .g4, .g4lg { grid-template-columns: repeat(2,1fr) !important; gap: 16px !important; }
    .g2         { grid-template-columns: 1fr !important; gap: 40px !important; }
    .gabout     { grid-template-columns: 1fr !important; gap: 40px !important; margin-bottom: 48px !important; }
    .gfooter    { grid-template-columns: 1fr 1fr !important; gap: 28px !important; }
    .gcart      { grid-template-columns: 1fr !important; }
    .gcheckout  { grid-template-columns: 1fr !important; }
    .gstats     { max-width: 100% !important; }
    .nav-desktop{ display: none !important; }
    .nav-right  { display: none !important; }
    .nav-hamburger { display: flex !important; align-items: center; gap: 16px; }
    .login-visual { display: none !important; }
  }

  /* ── Mobile ── */
  @media (max-width: 540px) {
    .g3     { grid-template-columns: 1fr !important; }
    .gfooter{ grid-template-columns: 1fr !important; }
    .px-page{ padding-left: 20px !important; padding-right: 20px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

function useIsMobile() {
  const [w, setW] = useState(typeof window !== 'undefined' ? window.innerWidth : 1200);
  useEffect(() => {
    const h = () => setW(window.innerWidth);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return w <= 900;
}

// ─── DATA ────────────────────────────────────────────────────────────────────
const NAV_LINKS = ['清潔', '精華液', '急救安瓶', '面膜', '眼霜', '面霜'];
const NAV_ITEMS = [
  { label: '所有產品', children: ['清潔', '精華液', '急救安瓶', '面膜', '眼霜', '面霜'] },
  { label: '會員登錄', children: ['一般會員', '美容師專區'] },
  { label: '品牌故事', children: null },
  { label: '購物說明', children: ['退換貨說明', '運送方式', '付款說明', '常見問題'] },
];

const PRODUCTS = [
  { id:1, name:'Deep Cleansing Foam',    nameZh:'深層清潔泡沫洗面乳', category:'清潔',   size:'200ml',   price:1280, proPrice:960,  isProOnly:false, tag:'暢銷', img:'https://images.unsplash.com/photo-1556228578-dd539282b964?w=600&q=80&fit=crop' },
  { id:2, name:'Peptide Repair Serum',   nameZh:'胜肽修護精華液',     category:'精華液', size:'30ml',    price:3980, proPrice:2980, isProOnly:false, tag:'新品', img:'https://images.unsplash.com/photo-1620916566398-39f1143ab7be?w=600&q=80&fit=crop' },
  { id:3, name:'SOS Ampoule Set',        nameZh:'急救修護安瓶組',     category:'急救安瓶',size:'5ml×6',  price:4800, proPrice:3600, isProOnly:false, tag:'',     img:'https://images.unsplash.com/photo-1617897903246-719242758050?w=600&q=80&fit=crop' },
  { id:4, name:'Intensive Hydra Mask',   nameZh:'密集保濕面膜',       category:'面膜',   size:'35ml×10', price:2200, proPrice:1650, isProOnly:false, tag:'',     img:'https://images.unsplash.com/photo-1629198688000-71f23e745b6e?w=600&q=80&fit=crop' },
  { id:5, name:'Eye Contour Complex',    nameZh:'眼周緊緻精華',       category:'眼霜',   size:'30ml',    price:2800, proPrice:2100, isProOnly:false, tag:'',     img:'https://images.unsplash.com/photo-1571781926291-c477ebfd024b?w=600&q=80&fit=crop' },
  { id:6, name:'Cell Recovery Cream',    nameZh:'細胞修護乳霜',       category:'面霜',   size:'50g',     price:3600, proPrice:2700, isProOnly:false, tag:'暢銷', img:'https://images.unsplash.com/photo-1612817288484-6f916006741a?w=600&q=80&fit=crop' },
  { id:7, name:'NK Cell Activator',      nameZh:'NK細胞活化安瓶',     category:'急救安瓶',size:'3.5ml×10',price:8800,proPrice:6600, isProOnly:true,  tag:'院線', img:'https://images.unsplash.com/photo-1608248597279-f99d160bfcbc?w=600&q=80&fit=crop' },
  { id:8, name:'AHA/BHA Peeling Gel',   nameZh:'AHA·BHA·PHA 煥膚凝膠',category:'清潔', size:'120ml',   price:1980, proPrice:1485, isProOnly:false, tag:'',     img:'https://images.unsplash.com/photo-1631390737500-0d64c52c7aa4?w=600&q=80&fit=crop' },
];

const HERO_SLIDES = [
  { headline:'Science\nMeets Skin.', sub:'韓國醫美院線 × 台灣專業代理', cta:'探索系列',   img:'https://images.unsplash.com/photo-1629732097571-b042b35aa3ed?w=1800&q=85&fit=crop', layout:'left',   accent:'New Collection 2026' },
  { headline:'Precision\nFormula.',  sub:'細胞級修護，皮膚科醫師驗證',    cta:'查看安瓶系列',img:'https://images.unsplash.com/photo-1620916566398-39f1143ab7be?w=1800&q=85&fit=crop', layout:'center', accent:'Professional Grade' },
  { headline:'Ritual of\nKorean Beauty.', sub:'專業美容師首選，院線品質保證', cta:'美容師專區', img:'https://images.unsplash.com/photo-1556228453-efd6c1ff04f6?w=1800&q=85&fit=crop', layout:'split',  accent:'For Professionals' },
];

// ─── NAV ITEM (desktop dropdown) ─────────────────────────────────────────────
function NavItem({ item, scrolled, setPage }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);

  function go(child) {
    setOpen(false);
    if (item.label === '所有產品') setPage('shop');
    else if (item.label === '會員登錄') setPage('login');
    else if (item.label === '品牌故事') setPage('about');
    else if (item.label === '購物說明') setPage('info');
  }

  const col = scrolled ? 'var(--dark)' : 'rgba(255,255,255,0.88)';
  return (
    <div ref={ref} style={{ position:'relative' }}
      onMouseEnter={() => item.children && setOpen(true)}
      onMouseLeave={() => setOpen(false)}>
      <button onClick={() => item.children ? setOpen(o=>!o) : go()} style={{
        background:'none', border:'none', cursor:'pointer',
        fontFamily:'var(--font-body)', fontSize:13, fontWeight:400,
        letterSpacing:'0.06em', color:col, padding:'8px 18px',
        display:'flex', alignItems:'center', gap:5, height:68, whiteSpace:'nowrap',
        transition:'color 0.3s',
      }}>
        {item.label}
        {item.children && (
          <svg width="10" height="6" viewBox="0 0 10 6" fill="none" style={{ transition:'transform 0.2s', transform: open ? 'rotate(180deg)' : 'none' }}>
            <path d="M1 1l4 4 4-4" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/>
          </svg>
        )}
      </button>
      {item.children && open && (
        <div style={{
          position:'absolute', top:'100%', left:'50%', transform:'translateX(-50%)',
          background:'rgba(250,250,249,0.98)', backdropFilter:'blur(16px)',
          border:'1px solid var(--light)', minWidth:160,
          boxShadow:'0 8px 32px rgba(0,0,0,0.08)', zIndex:200, padding:'8px 0',
          animation:'fadeInDown 0.18s ease',
        }}>
          {item.children.map(c => (
            <button key={c} onClick={() => go(c)} style={{
              display:'block', width:'100%', textAlign:'left', background:'none', border:'none',
              cursor:'pointer', fontFamily:'var(--font-body)', fontSize:13, color:'var(--dark)',
              padding:'11px 22px', letterSpacing:'0.04em', transition:'background 0.15s',
            }}
            onMouseEnter={e => { e.target.style.background='var(--off-white)'; e.target.style.color='var(--black)'; }}
            onMouseLeave={e => { e.target.style.background='none'; e.target.style.color='var(--dark)'; }}
            >{c}</button>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── NAV ─────────────────────────────────────────────────────────────────────
function Nav({ setPage, cartCount, user, setUser }) {
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);
  const isMobile = useIsMobile();

  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);
  }, []);

  useEffect(() => { if (!isMobile) setDrawerOpen(false); }, [isMobile]);

  const iconCol = scrolled ? 'var(--dark)' : 'rgba(255,255,255,0.88)';

  return (
    <>
      <nav style={{
        position:'fixed', top:0, left:0, right:0, zIndex:100,
        background: drawerOpen ? 'var(--white)' : scrolled ? 'rgba(250,250,249,0.96)' : 'transparent',
        backdropFilter: scrolled && !drawerOpen ? 'blur(12px)' : 'none',
        borderBottom: scrolled || drawerOpen ? '1px solid var(--light)' : '1px solid rgba(255,255,255,0.1)',
        transition:'background 0.4s, border-color 0.4s',
      }}>
        <div style={{ maxWidth:1280, margin:'0 auto', padding:'0 24px', height:68, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          {/* Logo */}
          <div onClick={() => { setPage('home'); setDrawerOpen(false); }} style={{ cursor:'pointer', display:'flex', flexDirection:'column', gap:1, flexShrink:0 }}>
            <span style={{ fontFamily:'var(--font-display)', fontSize:20, fontWeight:400, letterSpacing:'0.22em', color: drawerOpen ? 'var(--black)' : scrolled ? 'var(--black)' : 'var(--white)' }}>ECLADO</span>
            <span style={{ fontSize:9, letterSpacing:'0.28em', color:'var(--gold)', textTransform:'uppercase' }}>Korean Cosmeceuticals</span>
          </div>

          {/* Desktop nav */}
          <div className="nav-desktop">
            {NAV_ITEMS.map(item => <NavItem key={item.label} item={item} scrolled={scrolled} setPage={setPage} />)}
          </div>

          {/* Desktop right */}
          <div className="nav-right">
            {user ? (
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                {user.isPro && <span style={{ fontSize:10, letterSpacing:'0.1em', background: scrolled ? 'var(--black)' : 'rgba(255,255,255,0.15)', color:'var(--white)', padding:'3px 8px', fontWeight:500 }}>PRO</span>}
                <button onClick={() => setPage('account')} style={{ background:'none', border:'none', cursor:'pointer', fontSize:13, color:iconCol, fontFamily:'var(--font-body)' }}>{user.name}</button>
                <button onClick={() => setUser(null)} style={{ background:'none', border:'none', cursor:'pointer', fontSize:12, color: scrolled ? 'var(--mid)' : 'rgba(255,255,255,0.5)', fontFamily:'var(--font-body)' }}>登出</button>
              </div>
            ) : null}
            <button onClick={() => setPage('cart')} style={{ background:'none', border:'none', cursor:'pointer', fontSize:13, color:iconCol, fontFamily:'var(--font-body)', letterSpacing:'0.04em', position:'relative', padding:'4px 0', whiteSpace:'nowrap' }}>
              購物車
              {cartCount > 0 && <span style={{ position:'absolute', top:-4, right:-14, background:'var(--black)', color:'var(--white)', fontSize:9, width:16, height:16, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center' }}>{cartCount}</span>}
            </button>
          </div>

          {/* Mobile hamburger row */}
          <div className="nav-hamburger">
            <button onClick={() => setPage('cart')} style={{ background:'none', border:'none', cursor:'pointer', fontSize:13, color: drawerOpen ? 'var(--dark)' : iconCol, fontFamily:'var(--font-body)', position:'relative', padding:'4px 0' }}>
              購物車
              {cartCount > 0 && <span style={{ position:'absolute', top:-4, right:-14, background:'var(--black)', color:'var(--white)', fontSize:9, width:16, height:16, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center' }}>{cartCount}</span>}
            </button>
            <button onClick={() => setDrawerOpen(o => !o)} style={{ background:'none', border:'none', cursor:'pointer', display:'flex', flexDirection:'column', gap:5, padding:4 }}>
              {drawerOpen ? (
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M4 4l12 12M16 4L4 16" stroke={drawerOpen ? 'var(--dark)' : iconCol} strokeWidth="1.5" strokeLinecap="round"/></svg>
              ) : (
                <>
                  <span style={{ display:'block', width:22, height:1.5, background: scrolled ? 'var(--dark)' : 'var(--white)' }}/>
                  <span style={{ display:'block', width:16, height:1.5, background: scrolled ? 'var(--dark)' : 'var(--white)' }}/>
                  <span style={{ display:'block', width:22, height:1.5, background: scrolled ? 'var(--dark)' : 'var(--white)' }}/>
                </>
              )}
            </button>
          </div>
        </div>
      </nav>

      {/* Mobile drawer */}
      {drawerOpen && (
        <div className="mobile-drawer">
          {NAV_ITEMS.map(item => (
            <MobileNavSection key={item.label} item={item} setPage={setPage} close={() => setDrawerOpen(false)} />
          ))}
          <div style={{ borderTop:'1px solid var(--light)', paddingTop:24, marginTop:8, display:'flex', flexDirection:'column', gap:16 }}>
            {user ? (
              <>
                <span style={{ fontSize:14, color:'var(--dark)' }}>{user.isPro && <span style={{ fontSize:10, background:'var(--black)', color:'var(--white)', padding:'2px 7px', marginRight:8 }}>PRO</span>}{user.name}</span>
                <button onClick={() => { setUser(null); setDrawerOpen(false); }} style={{ background:'none', border:'none', cursor:'pointer', fontSize:13, color:'var(--mid)', textAlign:'left', padding:0 }}>登出</button>
              </>
            ) : null}
          </div>
        </div>
      )}
    </>
  );
}

function MobileNavSection({ item, setPage, close }) {
  const [open, setOpen] = useState(false);
  function go(page) { setPage(page); close(); }
  return (
    <div style={{ borderBottom:'1px solid var(--light)' }}>
      <button onClick={() => item.children ? setOpen(o=>!o) : go(item.label === '品牌故事' ? 'about' : 'info')} style={{
        width:'100%', background:'none', border:'none', cursor:'pointer', display:'flex', justifyContent:'space-between', alignItems:'center',
        padding:'18px 0', fontSize:15, color:'var(--dark)', fontFamily:'var(--font-body)', letterSpacing:'0.04em',
      }}>
        {item.label}
        {item.children && <svg width="10" height="6" viewBox="0 0 10 6" fill="none" style={{ transition:'transform 0.2s', transform: open ? 'rotate(180deg)' : 'none' }}><path d="M1 1l4 4 4-4" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>}
      </button>
      {item.children && open && (
        <div style={{ paddingBottom:8 }}>
          {item.children.map(c => (
            <button key={c} onClick={() => {
              if (item.label === '所有產品') go('shop');
              else if (item.label === '會員登錄') go('login');
              else if (item.label === '購物說明') go('info');
            }} style={{ display:'block', width:'100%', textAlign:'left', background:'none', border:'none', cursor:'pointer', fontFamily:'var(--font-body)', fontSize:13, color:'var(--mid)', padding:'10px 16px', letterSpacing:'0.04em' }}>
              {c}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── HOME PAGE ────────────────────────────────────────────────────────────────
function HomePage({ setPage, user, cart, setCart }) {
  const [slide, setSlide] = useState(0);
  const [animating, setAnimating] = useState(false);
  const isMobile = useIsMobile();

  useEffect(() => {
    const t = setInterval(() => {
      setAnimating(true);
      setTimeout(() => { setSlide(s => (s + 1) % HERO_SLIDES.length); setAnimating(false); }, 450);
    }, 5000);
    return () => clearInterval(t);
  }, []);

  const featured = PRODUCTS.filter(p => !p.isProOnly).slice(0, 4);

  function addToCart(product) {
    setCart(prev => {
      const ex = prev.find(i => i.id === product.id);
      if (ex) return prev.map(i => i.id === product.id ? { ...i, qty: i.qty+1 } : i);
      return [...prev, { ...product, qty:1 }];
    });
  }

  const heroPad = isMobile ? '0 6vw' : '0 10vw';

  return (
    <div>
      {/* HERO */}
      <section style={{ height:'100vh', position:'relative', overflow:'hidden', background:'#1a1a18' }}>
        {HERO_SLIDES.map((s,i) => (
          <img key={i} src={s.img} alt="" style={{ position:'absolute', top:0, left:0, width:'100%', height:'100%', objectFit:'cover', opacity: i===slide ? 1 : 0, transition:'opacity 0.9s ease', pointerEvents:'none' }} />
        ))}

        {/* Layout 1: left */}
        {HERO_SLIDES[slide].layout === 'left' && (
          <>
            <div style={{ position:'absolute', inset:0, background:'linear-gradient(to right, rgba(14,14,12,0.88) 45%, rgba(14,14,12,0.15))' }} />
            <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', justifyContent:'center', padding:heroPad, maxWidth: isMobile ? '100%' : 780, opacity: animating?0:1, transition:'opacity 0.45s' }}>
              <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:16 }}>
                <div style={{ width:28, height:1, background:'var(--gold)' }} />
                <span style={{ fontSize:10, letterSpacing:'0.3em', color:'var(--gold)', textTransform:'uppercase', fontFamily:'var(--font-body)' }}>{HERO_SLIDES[slide].accent}</span>
              </div>
              <h1 style={{ fontFamily:'var(--font-display)', fontSize:'clamp(40px,7.5vw,104px)', fontWeight:300, color:'var(--white)', lineHeight:1.0, whiteSpace:'pre-line', marginBottom:20 }}>{HERO_SLIDES[slide].headline}</h1>
              <p style={{ fontSize:13, color:'rgba(255,255,255,0.55)', letterSpacing:'0.08em', marginBottom:36, fontWeight:300 }}>{HERO_SLIDES[slide].sub}</p>
              <div style={{ display:'flex', gap:12, flexWrap:'wrap' }}>

// ─── PRODUCT CARD ─────────────────────────────────────────────────────────────
function ProductCard({ product, user, onAdd, setPage }) {
  const [hovered, setHovered] = useState(false);
  const showPrice = user?.isPro ? product.proPrice : product.price;
  return (
    <div onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)} style={{ cursor:'pointer', position:'relative' }}>
      {product.tag && (
        <div style={{ position:'absolute', top:10, left:10, zIndex:2, background: product.tag==='院線'?'var(--dark)':'var(--gold)', color:'var(--white)', fontSize:10, padding:'3px 9px', letterSpacing:'0.1em' }}>{product.tag}</div>
      )}
      <div style={{ position:'relative', overflow:'hidden', marginBottom:14 }}>
        <img src={product.img} alt={product.nameZh} style={{ width:'100%', height:260, objectFit:'cover', display:'block', transition:'transform 0.5s', transform: hovered?'scale(1.04)':'scale(1)' }} />
        <div style={{ position:'absolute', bottom:0, left:0, right:0, background:'var(--black)', padding:'10px', transform: hovered?'translateY(0)':'translateY(100%)', transition:'transform 0.25s' }}>
          <button onClick={e => { e.stopPropagation(); onAdd(); }} style={{ width:'100%', background:'none', border:'none', cursor:'pointer', color:'var(--white)', fontSize:11, letterSpacing:'0.15em', textTransform:'uppercase', fontFamily:'var(--font-body)', padding:'3px 0' }}>加入購物車</button>
        </div>
      </div>
      <div>
        <p style={{ fontSize:10, letterSpacing:'0.14em', color:'var(--dark)', textTransform:'uppercase', marginBottom:5 }}>{product.category}</p>
        <p style={{ fontSize:12, color:'var(--dark)', marginBottom:8 }}>{product.nameZh} · {product.size}</p>
        <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
          <span style={{ fontSize:15, fontWeight:500, color:'var(--black)' }}>NT$ {showPrice.toLocaleString()}</span>
          {user?.isPro && <span style={{ fontSize:11, color:'var(--mid)', textDecoration:'line-through' }}>NT$ {product.price.toLocaleString()}</span>}
          {user?.isPro && <span style={{ fontSize:10, background:'var(--off-white)', color:'var(--dark)', padding:'2px 6px' }}>專業價</span>}
        </div>
      </div>
    </div>
  );
}

// ─── SHOP PAGE ────────────────────────────────────────────────────────────────
function ShopPage({ user, cart, setCart }) {
  const [activeCategory, setActiveCategory] = useState('全部');
  const categories = ['全部', ...NAV_LINKS];
  const isMobile = useIsMobile();

  function addToCart(product) {
    setCart(prev => {
      const ex = prev.find(i => i.id === product.id);
      if (ex) return prev.map(i => i.id === product.id ? { ...i, qty: i.qty+1 } : i);
      return [...prev, { ...product, qty:1 }];
    });
  }

  const filtered = PRODUCTS.filter(p => {
    if (p.isProOnly && !user?.isPro) return false;
    if (activeCategory === '全部') return true;
    return p.category === activeCategory;
  });

  return (
    <div style={{ paddingTop:68 }}>
      <div style={{ background:'var(--off-white)', padding: isMobile ? '48px 24px 36px' : '64px 32px 48px', textAlign:'center', borderBottom:'1px solid var(--light)' }}>
        <p style={{ fontSize:11, letterSpacing:'0.28em', color:'var(--gold)', textTransform:'uppercase', marginBottom:10 }}>Shop</p>
        <h1 style={{ fontFamily:'var(--font-display)', fontSize: isMobile ? 32 : 44, fontWeight:300, color:'var(--black)', lineHeight:1.1 }}>全部商品</h1>
      </div>
      <div className="filter-tabs" style={{ background:'var(--white)', borderBottom:'1px solid var(--light)', padding:'0 24px' }}>
        {categories.map(cat => (
          <button key={cat} onClick={() => setActiveCategory(cat)} style={{
            background:'none', border:'none', cursor:'pointer', fontFamily:'var(--font-body)', fontSize:13,
            color: activeCategory===cat ? 'var(--black)' : 'var(--mid)',
            padding:'18px 20px', letterSpacing:'0.06em',
            borderBottom: activeCategory===cat ? '1px solid var(--black)' : '1px solid transparent',
            fontWeight: activeCategory===cat ? 500 : 300, transition:'all 0.2s',
          }}>{cat}</button>
        ))}
      </div>
      <div style={{ maxWidth:1280, margin:'0 auto', padding: isMobile ? '40px 20px' : '60px 32px' }}>
        {user?.isPro && (
          <div style={{ background:'var(--dark)', color:'var(--white)', padding:'12px 18px', marginBottom:32, display:'flex', alignItems:'center', gap:10, flexWrap:'wrap' }}>
            <span style={{ fontSize:10, background:'var(--gold)', color:'var(--black)', padding:'2px 7px', letterSpacing:'0.1em', fontWeight:500 }}>PRO</span>
            <span style={{ fontSize:13 }}>您已登入美容師帳號，可查看院線商品及專業折扣價格</span>
          </div>
        )}
        <div className="g4lg">
          {filtered.map(p => <ProductCard key={p.id} product={p} user={user} onAdd={() => addToCart(p)} />)}
        </div>
        {filtered.length === 0 && <div style={{ textAlign:'center', padding:'80px 0', color:'var(--mid)', fontSize:14 }}>此分類目前無商品</div>}
      </div>
    </div>
  );
}

// ─── CART PAGE ────────────────────────────────────────────────────────────────
function CartPage({ cart, setCart, setPage }) {
  const isMobile = useIsMobile();
  function updateQty(id, delta) {
    setCart(prev => prev.map(i => i.id===id ? { ...i, qty: Math.max(0, i.qty+delta) } : i).filter(i => i.qty>0));
  }
  const total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);

  return (
    <div style={{ paddingTop:68, minHeight:'80vh' }}>
      <div style={{ maxWidth:900, margin:'0 auto', padding: isMobile ? '40px 20px' : '60px 32px' }}>
        <div style={{ display:'flex', alignItems:'baseline', gap:14, marginBottom:40 }}>

          <span style={{ fontSize:14, color:'var(--mid)' }}>{cart.length} 件商品</span>

        {cart.length === 0 ? (
          <div style={{ textAlign:'center', padding:'80px 0' }}>
            <p style={{ fontFamily:'var(--font-display)', fontSize:22, fontWeight:300, color:'var(--mid)', marginBottom:24 }}>購物車是空的</p>
            <button onClick={() => setPage('shop')} style={{ background:'var(--black)', color:'var(--white)', border:'none', padding:'12px 36px', fontSize:12, letterSpacing:'0.15em', cursor:'pointer', fontFamily:'var(--font-body)' }}>繼續購物</button>
          </div>
        ) : (
          <div className="gcart">
            <div>
              {cart.map(item => (
                <div key={item.id} style={{ display:'grid', gridTemplateColumns:'72px 1fr auto', gap:16, alignItems:'center', padding:'20px 0', borderBottom:'1px solid var(--light)' }}>
                  <img src={item.img} alt={item.nameZh} style={{ width:72, height:72, objectFit:'cover', display:'block' }} />
                  <div>
                    <p style={{ fontFamily:'var(--font-display)', fontSize:14, fontWeight:400, marginBottom:3 }}>{item.name}</p>

                    <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                      <button onClick={() => updateQty(item.id,-1)} style={{ width:26, height:26, border:'1px solid var(--light)', background:'none', cursor:'pointer', fontSize:15, lineHeight:1 }}>−</button>
                      <span style={{ fontSize:14, minWidth:20, textAlign:'center' }}>{item.qty}</span>
                      <button onClick={() => updateQty(item.id,1)} style={{ width:26, height:26, border:'1px solid var(--light)', background:'none', cursor:'pointer', fontSize:15, lineHeight:1 }}>+</button>

                    <p style={{ fontSize:14, fontWeight:500 }}>NT$ {(item.price*item.qty).toLocaleString()}</p>

                  </div>

          <div className="info-tabs">
            {Object.keys(sections).map(key => (
              <button key={key} onClick={() => setActive(key)} style={{ background:'none', border:'none', cursor:'pointer', fontFamily:'var(--font-body)', fontSize:13, color: active===key ? 'var(--black)' : 'var(--mid)', padding:'13px 20px 13px 0', marginRight:4, borderBottom: active===key ? '2px solid var(--black)' : '2px solid transparent', letterSpacing:'0.06em', fontWeight: active===key ? 500 : 300 }}>{key}</button>
            ))}
          </div>
        </div>
      </div>
      <div style={{ maxWidth:900, margin:'0 auto', padding: isMobile ? '40px 20px' : '60px 32px' }}>
        <h2 style={{ fontFamily:'var(--font-display)', fontSize: isMobile ? 22 : 28, fontWeight:300, marginBottom:32, color:'var(--black)' }}>{current.title}</h2>
        {current.content.map((item,i) => (
          <div key={i} style={{ display:'grid', gridTemplateColumns: isMobile ? '1fr' : '180px 1fr', gap: isMobile ? 8 : 32, padding:'24px 0', borderBottom:'1px solid var(--light)' }}>
            <div style={{ fontSize:13, fontWeight:500, color:'var(--black)', letterSpacing:'0.04em' }}>{item.q}</div>
            <div style={{ fontSize:14, color:'#555', lineHeight:1.9, whiteSpace:'pre-line' }}>{item.a}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('home');
  const [user, setUser] = useState(null);
  const [cart, setCart] = useState([]);
  const cartCount = cart.reduce((sum,i) => sum+i.qty, 0);

  function renderPage() {
    switch (page) {
      case 'home':     return <HomePage setPage={setPage} user={user} cart={cart} setCart={setCart} />;
      case 'shop':     return <ShopPage user={user} cart={cart} setCart={setCart} />;
      case 'cart':     return <CartPage cart={cart} setCart={setCart} setPage={setPage} />;
      case 'checkout': return <CheckoutPage cart={cart} setCart={setCart} setPage={setPage} />;
      case 'login':    return <LoginPage setUser={setUser} setPage={setPage} />;
      case 'about':    return <AboutPage />;
      case 'info':     return <InfoPage />;
      default:         return <HomePage setPage={setPage} user={user} cart={cart} setCart={setCart} />;
    }
  }

  return (
    <>
      {page !== 'login' && <Nav setPage={setPage} cartCount={cartCount} user={user} setUser={setUser} />}
      {renderPage()}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
